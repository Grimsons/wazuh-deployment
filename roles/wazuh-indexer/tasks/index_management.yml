---
# Wazuh Indexer - Index Templates and ISM Policies
# Creates index templates for Wazuh data and configures retention policies

- name: Create wazuh-alerts index template
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_index_template/wazuh-alerts"
    method: PUT
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(true) }}"
    body_format: json
    body:
      index_patterns:
        - "wazuh-alerts-*"
      template:
        settings:
          number_of_shards: "{{ wazuh_indexer_alerts_shards | default(1) }}"
          number_of_replicas: "{{ wazuh_indexer_alerts_replicas | default(0) }}"
          index.refresh_interval: "5s"
        mappings:
          properties:
            timestamp:
              type: date
            rule:
              properties:
                level:
                  type: integer
                description:
                  type: text
                id:
                  type: keyword
                groups:
                  type: keyword
            agent:
              properties:
                id:
                  type: keyword
                name:
                  type: keyword
                ip:
                  type: ip
            manager:
              properties:
                name:
                  type: keyword
            full_log:
              type: text
            location:
              type: keyword
      priority: 100
    status_code: [200]
  register: alerts_template_result
  changed_when: alerts_template_result.status == 200

- name: Create ISM retention policy
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_plugins/_ism/policies/wazuh-retention-policy"
    method: PUT
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(true) }}"
    body_format: json
    body:
      policy:
        description: "Wazuh index retention policy - {{ wazuh_retention_days | default(1095) }} days"
        default_state: hot
        states:
          - name: hot
            actions: []
            transitions:
              - state_name: warm
                conditions:
                  min_index_age: "{{ wazuh_retention_warm_after_days | default(30) }}d"
          - name: warm
            actions:
              - replica_count:
                  number_of_replicas: 0
              - force_merge:
                  max_num_segments: 1
            transitions:
              - state_name: cold
                conditions:
                  min_index_age: "{{ wazuh_retention_cold_after_days | default(90) }}d"
          - name: cold
            actions:
              - read_only: {}
            transitions:
              - state_name: delete
                conditions:
                  min_index_age: "{{ wazuh_retention_days | default(1095) }}d"
          - name: delete
            actions:
              - delete: {}
            transitions: []
        ism_template:
          - index_patterns:
              - "wazuh-alerts-*"
              - "wazuh-archives-*"
              - "wazuh-monitoring-*"
              - "wazuh-statistics-*"
            priority: 100
    status_code: [200, 201]
  register: ism_policy_result
  changed_when: ism_policy_result.status in [200, 201]
  when: wazuh_retention_enabled | default(true)

- name: Display index management status
  ansible.builtin.debug:
    msg: |
      Index Management configured:
      - Alerts template: Created
      - Retention policy: {{ wazuh_retention_days | default(1095) }} days ({{ (wazuh_retention_days | default(1095) / 365) | round(1) }} years)
        - Hot: 0-{{ wazuh_retention_warm_after_days | default(30) }} days
        - Warm: {{ wazuh_retention_warm_after_days | default(30) }}-{{ wazuh_retention_cold_after_days | default(90) }} days
        - Cold: {{ wazuh_retention_cold_after_days | default(90) }}-{{ wazuh_retention_days | default(1095) }} days
        - Delete: after {{ wazuh_retention_days | default(1095) }} days
