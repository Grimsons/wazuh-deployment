# ═══════════════════════════════════════════════════════════════
# Bootstrap Initial Indices with Write Aliases
# ═══════════════════════════════════════════════════════════════
# These indices are created with the proper naming convention and write alias
# Format: <index-name>-000001 (the 000001 suffix enables rollover numbering)

- name: Check if wazuh-alerts bootstrap index exists
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/{{ wazuh_alerts_alias | default('wazuh-alerts') }}-000001"
    method: HEAD
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    status_code: [200, 404]
  register: alerts_bootstrap_check
  when: wazuh_rollover_enabled | default(true)

- name: Create wazuh-alerts bootstrap index with write alias
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/{{ wazuh_alerts_alias | default('wazuh-alerts') }}-000001"
    method: PUT
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    body_format: json
    body: "{{ {'aliases': {(wazuh_alerts_alias | default('wazuh-alerts')): {'is_write_index': true}}} }}"
    status_code: [200]
    headers:
      Content-Type: "application/json"
  when:
    - wazuh_rollover_enabled | default(true)
    - alerts_bootstrap_check.status == 404

