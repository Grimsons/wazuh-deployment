# ═══════════════════════════════════════════════════════════════
# Configure Cluster Settings for Index Management
# ═══════════════════════════════════════════════════════════════
- name: Configure ISM job interval
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/settings"
    method: PUT
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    body_format: json
    body:
      persistent:
        plugins.index_state_management.job_interval: 5
    status_code: [200]
    headers:
      Content-Type: "application/json"
  register: ism_settings_result
  changed_when: ism_settings_result.status == 200
  when: wazuh_retention_enabled | default(true)

# ═══════════════════════════════════════════════════════════════
# Display Index Management Status
# ═══════════════════════════════════════════════════════════════
- name: Display index management configuration
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════
      INDEX MANAGEMENT CONFIGURED - Automatic Rollover Enabled
      ══════════════════════════════════════════════════════════════

      ROLLOVER SETTINGS (prevents 1000 index limit):
      ├─ Rollover triggers:
      │   ├─ Max size: {{ wazuh_rollover_max_size | default('30gb') }}
      │   ├─ Max age: {{ wazuh_rollover_max_age | default('1d') }}
      │   └─ Max docs: {{ wazuh_rollover_max_docs | default(50000000) }}
      └─ Cold indices are {{ 'CLOSED' if wazuh_close_cold_indices | default(true) else 'READ-ONLY' }}
         (Closed indices don't count toward 1000 limit!)

      ALERTS INDEX LIFECYCLE:
      ├─ HOT:    Active writes (0-{{ wazuh_retention_warm_after_days | default(7) }} days after rollover)
      ├─ WARM:   Reduced replicas, merged ({{ wazuh_retention_warm_after_days | default(7) }}-{{ wazuh_retention_cold_after_days | default(30) }} days)
      ├─ COLD:   {{ 'Closed' if wazuh_close_cold_indices | default(true) else 'Read-only' }} ({{ wazuh_retention_cold_after_days | default(30) }}-{{ wazuh_retention_days | default(365) }} days)
      └─ DELETE: After {{ wazuh_retention_days | default(365) }} days

      MONITORING/STATISTICS LIFECYCLE (shorter retention):
      ├─ HOT:    0-3 days
      ├─ WARM:   3-{{ wazuh_monitoring_retention_days | default(7) }} days
      └─ DELETE: After {{ wazuh_monitoring_retention_days | default(7) }} days

      WRITE ALIASES (Filebeat writes to these):
      ├─ {{ wazuh_alerts_alias | default('wazuh-alerts') }}      → wazuh-alerts-000001 (rolling)
      ├─ {{ wazuh_archives_alias | default('wazuh-archives') }}    → wazuh-archives-000001 (rolling)
      ├─ {{ wazuh_monitoring_alias | default('wazuh-monitoring') }}  → wazuh-monitoring-000001 (rolling)
      └─ {{ wazuh_statistics_alias | default('wazuh-statistics') }}  → wazuh-statistics-000001 (rolling)

      Note: Core field mappings (manager.name, agent.name, rule.groups, etc.)
            include .keyword subfields for aggregation support.
            Additional mappings from Filebeat's wazuh-template.json are merged.
      ══════════════════════════════════════════════════════════════
