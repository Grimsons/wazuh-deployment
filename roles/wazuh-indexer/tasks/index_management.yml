# ═══════════════════════════════════════════════════════════════
# Index Templates with Aliases for Rollover
# ═══════════════════════════════════════════════════════════════
- name: Create wazuh-alerts index template with rollover alias
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_index_template/wazuh-alerts-rollover"
    method: PUT
    user: "{{ wazuh_indexer_admin_user }}"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    body_format: json
    body:
      index_patterns:
        - "wazuh-alerts-*"
      template:
        settings:
          number_of_shards: "{{ wazuh_alerts_primary_shards | default(1) }}"
          number_of_replicas: "{{ wazuh_alerts_replica_shards | default(0) }}"
          index.refresh_interval: "5s"
          plugins.index_state_management.rollover_alias: "{{ wazuh_alerts_alias | default('wazuh-alerts') }}"
        mappings:
          properties:
            manager:
              properties:
                name:
                  type: text
                  fielddata: true
                  fields:
                    keyword:
                      type: keyword
                      ignore_above: 256
            agent:
              properties:
                name:
                  type: text
                  fielddata: true
                  fields:
                    keyword:
                      type: keyword
                      ignore_above: 256
                id:
                  type: keyword
                ip:
                  type: keyword
            rule:
              properties:
                groups:
                  type: text
                  fielddata: true
                  fields:
                    keyword:
                      type: keyword
                      ignore_above: 256
                description:
                  type: text
                  fielddata: true
                  fields:
                    keyword:
                      type: keyword
                      ignore_above: 256
      priority: 50
    status_code: [200]
    headers:
      Content-Type: "application/json"
  register: alerts_template_result
  changed_when: alerts_template_result.status == 200
  when: wazuh_rollover_enabled | default(true)

