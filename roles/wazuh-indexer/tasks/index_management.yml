---
# Wazuh Indexer - Automatic Index Management with Rollover
# Prevents reaching the 1000 open index limit through:
# 1. Automatic rollover based on size/age/document count
# 2. Closing cold indices (closed indices don't count toward open limit)
# 3. Automatic deletion after retention period
# 4. Write aliases for seamless index transitions

# ═══════════════════════════════════════════════════════════════
# Build Cold State Actions (conditional close)
# ═══════════════════════════════════════════════════════════════
- name: Set cold state actions (with close)
  ansible.builtin.set_fact:
    wazuh_cold_actions_with_close:
      - read_only: {}
      - index_priority:
          priority: 0
      - close: {}
    wazuh_cold_actions_without_close:
      - read_only: {}
      - index_priority:
          priority: 0

- name: Determine cold actions based on close setting
  ansible.builtin.set_fact:
    wazuh_cold_actions: "{{ wazuh_cold_actions_with_close if (wazuh_close_cold_indices | default(true)) else wazuh_cold_actions_without_close }}"

# ═══════════════════════════════════════════════════════════════
# Build ISM Policy Bodies (defined once, referenced in create/update)
# ═══════════════════════════════════════════════════════════════
- name: Build wazuh-alerts ISM policy body
  ansible.builtin.set_fact:
    _alerts_ism_body:
      policy:
        description: "Wazuh alerts index lifecycle with automatic rollover"
        default_state: hot
        states:
          - name: hot
            actions:
              - rollover:
                  min_size: "{{ wazuh_rollover_max_size | default('30gb') }}"
                  min_index_age: "{{ wazuh_rollover_max_age | default('1d') }}"
                  min_doc_count: "{{ wazuh_rollover_max_docs | default(50000000) }}"
            transitions:
              - state_name: warm
                conditions:
                  min_rollover_age: "{{ wazuh_retention_warm_after_days | default(7) }}d"
          - name: warm
            actions:
              - replica_count:
                  number_of_replicas: 0
              - force_merge:
                  max_num_segments: "{{ wazuh_warm_force_merge_segments | default(1) }}"
              - index_priority:
                  priority: 50
            transitions:
              - state_name: cold
                conditions:
                  min_rollover_age: "{{ wazuh_retention_cold_after_days | default(30) }}d"
          - name: cold
            actions: "{{ wazuh_cold_actions }}"
            transitions:
              - state_name: delete
                conditions:
                  min_rollover_age: "{{ wazuh_retention_days | default(365) }}d"
          - name: delete
            actions:
              - delete: {}
            transitions: []
        ism_template:
          - index_patterns:
              - "wazuh-alerts-*"
            priority: 100
  when: wazuh_retention_enabled | default(true)

- name: Build wazuh-archives ISM policy body
  ansible.builtin.set_fact:
    _archives_ism_body:
      policy:
        description: "Wazuh archives index lifecycle with automatic rollover"
        default_state: hot
        states:
          - name: hot
            actions:
              - rollover:
                  min_size: "{{ wazuh_rollover_max_size | default('30gb') }}"
                  min_index_age: "{{ wazuh_rollover_max_age | default('1d') }}"
                  min_doc_count: "{{ wazuh_rollover_max_docs | default(50000000) }}"
            transitions:
              - state_name: warm
                conditions:
                  min_rollover_age: "{{ wazuh_retention_warm_after_days | default(7) }}d"
          - name: warm
            actions:
              - replica_count:
                  number_of_replicas: 0
              - force_merge:
                  max_num_segments: "{{ wazuh_warm_force_merge_segments | default(1) }}"
              - index_priority:
                  priority: 50
            transitions:
              - state_name: cold
                conditions:
                  min_rollover_age: "{{ wazuh_retention_cold_after_days | default(30) }}d"
          - name: cold
            actions: "{{ wazuh_cold_actions }}"
            transitions:
              - state_name: delete
                conditions:
                  min_rollover_age: "{{ wazuh_retention_days | default(365) }}d"
          - name: delete
            actions:
              - delete: {}
            transitions: []
        ism_template:
          - index_patterns:
              - "wazuh-archives-*"
            priority: 100
  when: wazuh_retention_enabled | default(true)

- name: Build wazuh-monitoring ISM policy body
  ansible.builtin.set_fact:
    _monitoring_ism_body:
      policy:
        description: "Wazuh monitoring index lifecycle - shorter retention"
        default_state: hot
        states:
          - name: hot
            actions:
              - rollover:
                  min_size: "10gb"
                  min_index_age: "1d"
                  min_doc_count: 10000000
            transitions:
              - state_name: warm
                conditions:
                  min_rollover_age: "3d"
          - name: warm
            actions:
              - replica_count:
                  number_of_replicas: 0
              - force_merge:
                  max_num_segments: 1
            transitions:
              - state_name: delete
                conditions:
                  min_rollover_age: "{{ wazuh_monitoring_retention_days | default(7) }}d"
          - name: delete
            actions:
              - delete: {}
            transitions: []
        ism_template:
          - index_patterns:
              - "wazuh-monitoring-*"
            priority: 100
  when: wazuh_retention_enabled | default(true)

- name: Build wazuh-statistics ISM policy body
  ansible.builtin.set_fact:
    _statistics_ism_body:
      policy:
        description: "Wazuh statistics index lifecycle - shorter retention"
        default_state: hot
        states:
          - name: hot
            actions:
              - rollover:
                  min_size: "5gb"
                  min_index_age: "1d"
                  min_doc_count: 5000000
            transitions:
              - state_name: warm
                conditions:
                  min_rollover_age: "3d"
          - name: warm
            actions:
              - replica_count:
                  number_of_replicas: 0
              - force_merge:
                  max_num_segments: 1
            transitions:
              - state_name: delete
                conditions:
                  min_rollover_age: "{{ wazuh_statistics_retention_days | default(7) }}d"
          - name: delete
            actions:
              - delete: {}
            transitions: []
        ism_template:
          - index_patterns:
              - "wazuh-statistics-*"
            priority: 100
  when: wazuh_retention_enabled | default(true)

# ═══════════════════════════════════════════════════════════════
# ISM Policy with Rollover (Alerts)
# Uses block/rescue to handle ISM template conflicts on re-runs
# ═══════════════════════════════════════════════════════════════
- name: Create or update wazuh-alerts ISM policy
  block:
    - name: Check if wazuh-alerts ISM policy exists
      ansible.builtin.uri:
        url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_plugins/_ism/policies/wazuh-alerts-policy"
        method: GET
        user: "{{ wazuh_indexer_admin_user }}"
        password: "{{ wazuh_indexer_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
        status_code: [200, 404]
        return_content: true
      register: alerts_policy_check

    - name: Apply wazuh-alerts ISM policy
      ansible.builtin.uri:
        url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_plugins/_ism/policies/wazuh-alerts-policy{{ '?if_seq_no=' ~ alerts_policy_check.json._seq_no ~ '&if_primary_term=' ~ alerts_policy_check.json._primary_term if alerts_policy_check.status == 200 else '' }}"
        method: PUT
        user: "{{ wazuh_indexer_admin_user }}"
        password: "{{ wazuh_indexer_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
        body_format: json
        body: "{{ _alerts_ism_body }}"
        status_code: [200, 201]
        headers:
          Content-Type: "application/json"
  rescue:
    - name: Re-fetch wazuh-alerts ISM policy after conflict
      ansible.builtin.uri:
        url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_plugins/_ism/policies/wazuh-alerts-policy"
        method: GET
        user: "{{ wazuh_indexer_admin_user }}"
        password: "{{ wazuh_indexer_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
        status_code: [200]
        return_content: true
      register: alerts_policy_retry

    - name: Update wazuh-alerts ISM policy (conflict recovery)
      ansible.builtin.uri:
        url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_plugins/_ism/policies/wazuh-alerts-policy?if_seq_no={{ alerts_policy_retry.json._seq_no }}&if_primary_term={{ alerts_policy_retry.json._primary_term }}"
        method: PUT
        user: "{{ wazuh_indexer_admin_user }}"
        password: "{{ wazuh_indexer_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
        body_format: json
        body: "{{ _alerts_ism_body }}"
        status_code: [200, 201]
        headers:
          Content-Type: "application/json"
  when: wazuh_retention_enabled | default(true)

