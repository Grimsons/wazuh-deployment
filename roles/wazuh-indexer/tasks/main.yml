---
# Wazuh Indexer Role - Main Tasks

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      skip: true

- name: Install prerequisites
  ansible.builtin.include_tasks: prerequisites.yml

- name: Configure Wazuh repository
  ansible.builtin.include_tasks: repository.yml

- name: Install Wazuh Indexer
  ansible.builtin.include_tasks: install.yml

- name: Configure certificates
  ansible.builtin.include_tasks: certificates.yml

- name: Configure Wazuh Indexer
  ansible.builtin.include_tasks: configure.yml

- name: Configure JVM settings
  ansible.builtin.include_tasks: jvm.yml

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
  when: wazuh_configure_firewall | default(true)

- name: Enable Wazuh Indexer service
  ansible.builtin.systemd:
    name: "{{ wazuh_indexer_service_name }}"
    enabled: true
    daemon_reload: true
  become: true

- name: Start Wazuh Indexer service (non-blocking)
  ansible.builtin.systemd:
    name: "{{ wazuh_indexer_service_name }}"
    state: started
    no_block: true
  become: true
  register: indexer_start_result

- name: Wait for Wazuh Indexer to be listening
  ansible.builtin.wait_for:
    port: "{{ wazuh_indexer_http_port }}"
    host: "{{ ansible_default_ipv4.address }}"
    delay: "{{ wazuh_indexer_health_check_delay }}"
    timeout: "{{ wazuh_indexer_startup_timeout }}"
  become: true

- name: Verify Wazuh Indexer service is running
  ansible.builtin.systemd:
    name: "{{ wazuh_indexer_service_name }}"
  become: true
  register: indexer_service_status
  until: indexer_service_status.status.ActiveState == "active"
  retries: "{{ wazuh_indexer_health_check_retries }}"
  delay: "{{ wazuh_indexer_health_check_delay }}"

# Flush handlers to ensure indexer restarts with new config before security init
- name: Flush handlers before security initialization
  ansible.builtin.meta: flush_handlers

- name: Ensure Wazuh Indexer is running with latest config
  ansible.builtin.systemd:
    name: "{{ wazuh_indexer_service_name }}"
    state: restarted
    no_block: true
  become: true
  changed_when: false

- name: Wait for Indexer to be ready after restart
  ansible.builtin.wait_for:
    port: "{{ wazuh_indexer_http_port }}"
    host: "{{ ansible_default_ipv4.address }}"
    delay: "{{ wazuh_indexer_health_check_delay }}"
    timeout: "{{ wazuh_indexer_startup_timeout }}"
  become: true

- name: Initialize security (run only on first master)
  ansible.builtin.include_tasks: security_init.yml
  when: indexer_cluster_initial_master | default(false)

# Detect fresh install vs re-run by trying vault password against the indexer
- name: Check Wazuh Indexer with vault credentials
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/health"
    user: "admin"
    password: "{{ wazuh_indexer_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    status_code: [200, 401]
    return_content: true
  register: indexer_health_vault
  until: indexer_health_vault.status | default(0) in [200, 401]
  retries: "{{ wazuh_indexer_health_check_retries }}"
  delay: "{{ wazuh_indexer_health_check_delay }}"
  run_once: true
  no_log: true
  when: wazuh_indexer_admin_password is defined and wazuh_indexer_admin_password != 'admin'

# Set flag for whether password change is needed
- name: Determine if password change is needed
  ansible.builtin.set_fact:
    password_already_changed: "{{ (indexer_health_vault.status | default(401)) == 200 }}"
  run_once: true

# Wait for security to be ready with default credentials (fresh install only)
- name: Wait for Wazuh Indexer security to be ready (fresh install)
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/health"
    user: "admin"
    password: "{{ wazuh_indexer_default_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    status_code: [200]
    return_content: true
  register: indexer_health_initial
  until: indexer_health_initial.status == 200
  retries: "{{ wazuh_indexer_health_check_retries }}"
  delay: "{{ wazuh_indexer_health_check_delay }}"
  run_once: true
  no_log: true
  when: not (password_already_changed | default(false))

# Configure secure admin password (run on first master when not already changed)
- name: Configure secure admin password
  ansible.builtin.include_tasks: security_users.yml
  when:
    - indexer_cluster_initial_master | default(false)
    - not (password_already_changed | default(false))

# Set wazuh_admin_password from vault when password change was skipped (re-run)
- name: Set admin password from vault (re-run)
  ansible.builtin.set_fact:
    wazuh_admin_password: "{{ wazuh_indexer_admin_password }}"
  run_once: true
  when: password_already_changed | default(false)

# Final health check with new password
- name: Wait for Wazuh Indexer to be ready with credentials
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/health"
    user: "admin"
    password: "{{ wazuh_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    status_code: [200]
    return_content: true
  register: indexer_health
  until: indexer_health.status == 200
  retries: 10
  delay: 5
  run_once: true
  when: wazuh_admin_password is defined

# Configure index templates and ISM retention policies
- name: Configure index templates and retention policies
  ansible.builtin.include_tasks: index_management.yml
  when: indexer_cluster_initial_master | default(false)

- name: Configure log rotation
  ansible.builtin.include_tasks: log_rotation.yml
  when: wazuh_log_rotation_enabled | default(true)

- name: Display cluster health
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════
      Wazuh Indexer is ready!
      Cluster status: {{ (indexer_health.content | from_json).status | default('unknown') }}
      Credentials: Managed by Ansible Vault (group_vars/all/vault.yml)
      ═══════════════════════════════════════════════════════════════
  when: indexer_health is defined and indexer_health.status == 200
  run_once: true
