---
# Wazuh Indexer Role - Main Tasks

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
    - "{{ ansible_distribution }}.yml"
    - "{{ ansible_os_family }}.yml"
    - "default.yml"
  ignore_errors: true

- name: Install prerequisites
  ansible.builtin.include_tasks: prerequisites.yml

- name: Configure Wazuh repository
  ansible.builtin.include_tasks: repository.yml

- name: Install Wazuh Indexer
  ansible.builtin.include_tasks: install.yml

- name: Configure certificates
  ansible.builtin.include_tasks: certificates.yml

- name: Configure Wazuh Indexer
  ansible.builtin.include_tasks: configure.yml

- name: Configure JVM settings
  ansible.builtin.include_tasks: jvm.yml

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
  when: wazuh_configure_firewall | default(true)

- name: Start and enable Wazuh Indexer service
  ansible.builtin.service:
    name: "{{ wazuh_indexer_service_name }}"
    state: started
    enabled: true
  become: true

# Flush handlers to ensure indexer restarts with new config before security init
- name: Flush handlers before security initialization
  ansible.builtin.meta: flush_handlers

- name: Ensure Wazuh Indexer is running with latest config
  ansible.builtin.service:
    name: "{{ wazuh_indexer_service_name }}"
    state: restarted
  become: true
  changed_when: false

- name: Wait for Indexer to be ready after restart
  ansible.builtin.wait_for:
    port: "{{ wazuh_indexer_http_port }}"
    delay: 5
    timeout: 120
  become: true

- name: Initialize security (run only on first master)
  ansible.builtin.include_tasks: security_init.yml
  when: indexer_cluster_initial_master | default(false)

# Verify indexer is responding with default credentials before changing password
- name: Wait for Wazuh Indexer security to be ready
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/health"
    user: "admin"
    password: "admin"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(true) }}"
    status_code: [200]
    return_content: true
  register: indexer_health_initial
  until: indexer_health_initial.status == 200
  retries: 30
  delay: 10
  run_once: true

# Configure secure admin password (run only on first master after security init)
- name: Configure secure admin password
  ansible.builtin.include_tasks: security_users.yml
  when: indexer_cluster_initial_master | default(false)

# Final health check with new password
- name: Wait for Wazuh Indexer to be ready with new credentials
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_indexer_http_port }}/_cluster/health"
    user: "admin"
    password: "{{ wazuh_admin_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(true) }}"
    status_code: [200]
    return_content: true
  register: indexer_health
  until: indexer_health.status == 200
  retries: 10
  delay: 5
  run_once: true
  when: wazuh_admin_password is defined

# Configure index templates and ISM retention policies
- name: Configure index templates and retention policies
  ansible.builtin.include_tasks: index_management.yml
  when: indexer_cluster_initial_master | default(false)

- name: Configure log rotation
  ansible.builtin.include_tasks: log_rotation.yml
  when: wazuh_log_rotation_enabled | default(true)

- name: Display cluster health
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════
      Wazuh Indexer is ready!
      Cluster status: {{ (indexer_health.content | from_json).status | default('unknown') }}
      Credentials saved to: {{ playbook_dir }}/credentials/indexer_admin_password.txt
      ═══════════════════════════════════════════════════════════════
  when: indexer_health is defined and indexer_health.status == 200
  run_once: true
