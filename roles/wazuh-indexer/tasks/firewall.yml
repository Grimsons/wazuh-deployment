---
# Wazuh Indexer - Firewall Configuration
# Dynamically allows access only from cluster components (managers, dashboards, indexers)

- name: Check if firewalld is installed
  ansible.builtin.command: which firewall-cmd
  register: firewalld_check
  changed_when: false
  failed_when: false

- name: Check if ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

# Build dynamic list of allowed IPs from cluster configuration
- name: Build list of indexer node IPs (for inter-indexer communication)
  ansible.builtin.set_fact:
    indexer_node_ips: "{{ wazuh_indexer_nodes | map(attribute='ip') | list }}"

- name: Build list of manager node IPs (need to send data to indexer)
  ansible.builtin.set_fact:
    manager_node_ips: "{{ wazuh_manager_nodes | map(attribute='ip') | list }}"

- name: Build list of dashboard node IPs (need to query indexer)
  ansible.builtin.set_fact:
    dashboard_node_ips: "{{ wazuh_dashboard_nodes | map(attribute='ip') | list }}"

# Combine all IPs that need HTTP access (9200)
- name: Build list of IPs allowed for HTTP port (9200)
  ansible.builtin.set_fact:
    indexer_http_allowed_ips: "{{ (indexer_node_ips + manager_node_ips + dashboard_node_ips + (wazuh_indexer_additional_allowed_ips | default([]))) | unique }}"

# Only indexers need transport port access (9300)
- name: Build list of IPs allowed for transport port (9300)
  ansible.builtin.set_fact:
    indexer_transport_allowed_ips: "{{ (indexer_node_ips + (wazuh_indexer_additional_transport_ips | default([]))) | unique }}"

- name: Display allowed IPs for indexer
  ansible.builtin.debug:
    msg: |
      Indexer Firewall - Dynamic IP Configuration:
      ═══════════════════════════════════════════════════════════════
      HTTP Port ({{ wazuh_indexer_http_port }}) allowed from:
        - Indexers: {{ indexer_node_ips | join(', ') }}
        - Managers: {{ manager_node_ips | join(', ') }}
        - Dashboards: {{ dashboard_node_ips | join(', ') }}
        {% if wazuh_indexer_additional_allowed_ips | default([]) | length > 0 %}
        - Additional: {{ wazuh_indexer_additional_allowed_ips | join(', ') }}
        {% endif %}

      Transport Port ({{ wazuh_indexer_transport_port | default(9300) }}) allowed from:
        - Indexers only: {{ indexer_transport_allowed_ips | join(', ') }}
      ═══════════════════════════════════════════════════════════════

# Install UFW on Debian/Ubuntu if not present and no firewalld
- name: Install UFW (Debian/Ubuntu)
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
  become: true
  when:
    - ansible_os_family == 'Debian'
    - ufw_check.rc != 0
    - firewalld_check.rc != 0

- name: Re-check if ufw is installed after installation
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'Debian'

- name: Check if UFW is active
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false
  when: ufw_check.rc == 0
  become: true

# Allow SSH first before enabling UFW to prevent lockout
- name: Pre-enable - Allow SSH port via iptables (prevent lockout)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 22
    jump: ACCEPT
  become: true
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'inactive' in ufw_status.stdout.lower()"
  ignore_errors: true

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'inactive' in ufw_status.stdout.lower()"

- name: Set UFW default allow outgoing
  community.general.ufw:
    policy: allow
    direction: outgoing
  become: true
  when:
    - ufw_check.rc == 0

- name: Re-check UFW status after enabling
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false
  when: ufw_check.rc == 0
  become: true

# UFW (Debian/Ubuntu)
- name: Configure UFW rules
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'active' in ufw_status.stdout.lower()"
  block:
    - name: Allow SSH from anywhere
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: true

    # HTTP port (9200) - Allow from managers, dashboards, and other indexers
    - name: Allow Wazuh Indexer HTTP port from cluster components
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_indexer_http_port }}"
        proto: tcp
        from_ip: "{{ item }}"
        comment: "Wazuh Indexer HTTP - {{ item }}"
      become: true
      loop: "{{ indexer_http_allowed_ips }}"

    # Transport port (9300) - Only allow from other indexers
    - name: Allow Wazuh Indexer transport port from other indexers
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_indexer_transport_port | default(9300) }}"
        proto: tcp
        from_ip: "{{ item }}"
        comment: "Wazuh Indexer Transport - {{ item }}"
      become: true
      loop: "{{ indexer_transport_allowed_ips }}"

# Firewalld (RHEL/CentOS) - Using rich rules for source IP restrictions
- name: Configure firewalld rules
  when: firewalld_check.rc == 0
  block:
    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      become: true

    - name: Allow SSH
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
      become: true

    # HTTP port (9200) - Allow from managers, dashboards, and other indexers
    - name: Allow Wazuh Indexer HTTP port from cluster components (firewalld)
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item }}" port port="{{ wazuh_indexer_http_port }}" protocol="tcp" accept'
        permanent: true
        state: enabled
      become: true
      loop: "{{ indexer_http_allowed_ips }}"

    # Transport port (9300) - Only allow from other indexers
    - name: Allow Wazuh Indexer transport port from other indexers (firewalld)
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item }}" port port="{{ wazuh_indexer_transport_port | default(9300) }}" protocol="tcp" accept'
        permanent: true
        state: enabled
      become: true
      loop: "{{ indexer_transport_allowed_ips }}"

    - name: Reload firewalld
      ansible.builtin.command: firewall-cmd --reload
      become: true
      changed_when: true
