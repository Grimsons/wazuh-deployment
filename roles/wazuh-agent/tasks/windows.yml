---
# Wazuh Agent - Windows Tasks

- name: Set Wazuh Manager address for agent enrollment
  ansible.builtin.set_fact:
    wazuh_manager_address: "{{ wazuh_agent_registration_address | default(wazuh_manager_nodes[0].ip) }}"

- name: Create temp directory for Wazuh installer
  ansible.windows.win_file:
    path: C:\Temp\wazuh
    state: directory

- name: Download Wazuh Agent MSI installer
  ansible.windows.win_get_url:
    url: "https://packages.wazuh.com/4.x/windows/wazuh-agent-{{ wazuh_version }}-1.msi"
    dest: C:\Temp\wazuh\wazuh-agent.msi

- name: Install Wazuh Agent
  ansible.windows.win_package:
    path: C:\Temp\wazuh\wazuh-agent.msi
    state: present
    arguments:
      - /q
      - WAZUH_MANAGER={{ wazuh_manager_address }}
      - WAZUH_REGISTRATION_SERVER={{ wazuh_manager_address }}
  notify: restart wazuh-agent-windows

- name: Configure Wazuh Agent for Windows
  ansible.windows.win_template:
    src: ossec-windows.conf.j2
    dest: 'C:\Program Files (x86)\ossec-agent\ossec.conf'
    backup: true
  notify: restart wazuh-agent-windows

- name: Read enrollment password from credentials file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/credentials/agent_enrollment_password.txt"
  delegate_to: localhost
  become: false
  register: agent_enrollment_password_content
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is not defined
  vars:
    ansible_become: false
  ignore_errors: true

- name: Extract enrollment password
  ansible.builtin.set_fact:
    wazuh_agent_enrollment_password: "{{ agent_enrollment_password_content.content | b64decode | regex_search('Password:\\s*(.+)', '\\1') | first | trim }}"
  when:
    - agent_enrollment_password_content is defined
    - agent_enrollment_password_content is not skipped
    - agent_enrollment_password_content.content is defined
    - not agent_enrollment_password_content.failed | default(false)
  no_log: true

- name: Deploy enrollment password file to Windows agent
  ansible.windows.win_copy:
    content: "{{ wazuh_agent_enrollment_password }}"
    dest: 'C:\Program Files (x86)\ossec-agent\authd.pass'
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is defined

- name: Start Wazuh Agent service
  ansible.windows.win_service:
    name: WazuhSvc
    state: started
    start_mode: auto

- name: Clean up temp files
  ansible.windows.win_file:
    path: C:\Temp\wazuh
    state: absent
