---
# Wazuh Agent - Linux Tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == 'Debian'

- name: Import Wazuh GPG key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: "{{ wazuh_repo_gpg_key }}"
    state: present
  become: true
  when: ansible_os_family == 'Debian'

- name: Add Wazuh repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb {{ wazuh_repo_url_apt }} stable main"
    state: present
    filename: wazuh
    update_cache: true
  become: true
  when: ansible_os_family == 'Debian'

- name: Import Wazuh GPG key (RHEL/CentOS)
  ansible.builtin.rpm_key:
    key: "{{ wazuh_repo_gpg_key }}"
    state: present
  become: true
  when: ansible_os_family == 'RedHat'

- name: Add Wazuh repository (RHEL/CentOS)
  ansible.builtin.yum_repository:
    name: wazuh
    description: Wazuh repository
    baseurl: "{{ wazuh_repo_url_yum }}"
    gpgcheck: true
    gpgkey: "{{ wazuh_repo_gpg_key }}"
    enabled: true
  become: true
  when: ansible_os_family == 'RedHat'

- name: Set Wazuh Manager address for agent enrollment
  ansible.builtin.set_fact:
    wazuh_manager_address: "{{ wazuh_agent_registration_address | default(wazuh_manager_nodes[0].ip, true) }}"

- name: Install Wazuh Agent (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_version }}-*"
    state: present
    update_cache: true
    allow_downgrades: true
  become: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_address }}"
  when: ansible_os_family == 'Debian'
  notify: restart wazuh-agent

- name: Install Wazuh Agent (RHEL/CentOS)
  ansible.builtin.dnf:
    name: "wazuh-agent-{{ wazuh_version }}"
    state: present
  become: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_address }}"
  when: ansible_os_family == 'RedHat'
  notify: restart wazuh-agent

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Configure Wazuh Agent
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: "{{ wazuh_agent_config_path }}"
    owner: root
    group: wazuh
    mode: '0640'
    backup: true
  become: true
  notify: restart wazuh-agent

- name: Fail if enrollment password is required but not in vault
  ansible.builtin.fail:
    msg: |
      Agent enrollment password is required but not defined in Ansible vault.

      Please add 'wazuh_agent_enrollment_password' to your Ansible vault:
        ansible-vault edit group_vars/all/vault.yml

      Or set 'wazuh_authd_use_password: false' to disable password-based enrollment.
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is not defined or wazuh_agent_enrollment_password | length == 0

- name: Deploy enrollment password file to agent
  ansible.builtin.copy:
    content: "{{ wazuh_agent_enrollment_password }}"
    dest: /var/ossec/etc/authd.pass
    owner: root
    group: wazuh
    mode: '0640'
  become: true
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is defined
    - wazuh_agent_enrollment_password | length > 0

- name: Enable Wazuh Agent service
  ansible.builtin.systemd:
    name: "{{ wazuh_agent_service_name }}"
    enabled: true
    daemon_reload: true
  become: true

- name: Start Wazuh Agent service (non-blocking)
  ansible.builtin.systemd:
    name: "{{ wazuh_agent_service_name }}"
    state: started
    no_block: true
  become: true

- name: Verify Wazuh Agent service is running
  ansible.builtin.systemd:
    name: "{{ wazuh_agent_service_name }}"
  become: true
  register: agent_service_start
  until: agent_service_start.status.ActiveState == "active"
  retries: 30
  delay: 5
  ignore_errors: true

- name: Get agent service status if start failed
  ansible.builtin.command: systemctl status wazuh-agent --no-pager -l
  become: true
  register: agent_status
  changed_when: false
  failed_when: false
  when: agent_service_start.failed | default(false)

- name: Get agent journal logs if start failed
  ansible.builtin.command: journalctl -u wazuh-agent --no-pager -n 50
  become: true
  register: agent_journal
  changed_when: false
  failed_when: false
  when: agent_service_start.failed | default(false)

- name: Get agent ossec.log if start failed
  ansible.builtin.command: tail -100 /var/ossec/logs/ossec.log
  become: true
  register: agent_ossec_log
  changed_when: false
  failed_when: false
  when: agent_service_start.failed | default(false)

- name: Display agent diagnostic info
  ansible.builtin.debug:
    msg: |
      === Service Status ===
      {{ agent_status.stdout | default('No status available') }}

      === Journal Logs ===
      {{ agent_journal.stdout | default('No logs available') }}

      === OSSEC Log ===
      {{ agent_ossec_log.stdout | default('No ossec.log available') }}
  when: agent_service_start.failed | default(false)

- name: Fail if agent service did not start
  ansible.builtin.fail:
    msg: "Wazuh Agent failed to start. See diagnostic info above."
  when: agent_service_start.failed | default(false)

- name: Wait for agent to connect to manager
  ansible.builtin.wait_for:
    path: /var/ossec/var/run/wazuh-agentd.state
    state: present
    timeout: 120
  become: true
  ignore_errors: true
