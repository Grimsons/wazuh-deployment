---
# Wazuh Dashboard - Log Rotation Configuration

- name: Configure Wazuh Dashboard log rotation
  ansible.builtin.template:
    src: logrotate_wazuh_dashboard.j2
    dest: /etc/logrotate.d/wazuh-dashboard
    owner: root
    group: root
    mode: '0644'
  become: true
  when: wazuh_log_rotation_enabled | default(true)
