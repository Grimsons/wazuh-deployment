---
# Wazuh Manager Role - Default Variables

# Package settings
wazuh_manager_package_name: "wazuh-manager"
wazuh_manager_service_name: "wazuh-manager"

# Repository settings
wazuh_repo_gpg_key: "https://packages.wazuh.com/key/GPG-KEY-WAZUH"
wazuh_repo_url_apt: "https://packages.wazuh.com/4.x/apt/"
wazuh_repo_url_yum: "https://packages.wazuh.com/4.x/yum/"

# Manager configuration
wazuh_manager_config_path: /var/ossec/etc/ossec.conf
wazuh_manager_log_path: /var/ossec/logs

# ═══════════════════════════════════════════════════════════════
# API Authentication Settings
# ═══════════════════════════════════════════════════════════════
# Default password used for initial API authentication (Wazuh ships with this)
# This password is automatically changed to a secure random password during deployment
# DO NOT change this unless Wazuh changes their default
wazuh_api_default_password: "wazuh"

# Startup check timeouts (configurable for slow systems)
wazuh_api_check_retries: 30
wazuh_api_check_delay: 10
wazuh_service_start_timeout: 300

# API settings
wazuh_manager_api_bind_addr: "0.0.0.0"
wazuh_manager_api_https: true
wazuh_manager_api_ssl_protocol: "TLSv1.2"
wazuh_manager_api_log_format: "json"

# API Rate Limiting & Security Hardening
# Max failed login attempts before blocking (default: 5)
wazuh_manager_api_max_login_attempts: 5
# Block time in seconds after max failed attempts (default: 900 = 15 min)
wazuh_manager_api_block_time: 900
# Max API requests per minute per client (default: 100)
wazuh_manager_api_max_requests_per_minute: 100

# Remote command execution - DISABLED by default for security
# Only enable if you need to push commands via API
wazuh_manager_api_allow_remote_localfile: false
wazuh_manager_api_allow_remote_wodle: false

# Agent enrollment - SECURE DEFAULTS
wazuh_authd_enabled: true
wazuh_authd_use_source_ip: false
wazuh_authd_purge: false
# SECURITY: Verify manager hostname during enrollment (prevents rogue manager attacks)
wazuh_authd_ssl_verify_host: true
wazuh_authd_ssl_auto_negotiate: true
# SECURITY: Require password for agent enrollment (recommended for production)
wazuh_authd_use_password: true
# Strong cipher suite (disables weak ciphers)
wazuh_authd_ssl_ciphers: "HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH"

# Cluster defaults
wazuh_manager_cluster_enabled: false
wazuh_manager_cluster_name: "wazuh-cluster"
wazuh_manager_cluster_node_name: "manager-1"
wazuh_manager_cluster_node_type: "master"
wazuh_manager_cluster_key: ""
wazuh_manager_cluster_port: 1516
wazuh_manager_cluster_bind_addr: "0.0.0.0"

# Alert output formats
wazuh_jsonout_output: true           # JSON output for alerts (alerts.json)
wazuh_alerts_log: true               # Plain text alerts (alerts.log)
wazuh_logall: false                  # Log all events, not just alerts
wazuh_logall_json: false             # Log all events in JSON format
wazuh_internal_log_format: "plain"   # Internal logging format: plain, json, or plain,json

# Email alerts
wazuh_email_notification_enabled: false
wazuh_email_smtp_server: ""
wazuh_email_from: "wazuh@localhost"
wazuh_email_to: ""
wazuh_email_alert_level: 12
wazuh_email_maxperhour: 12
wazuh_log_alert_level: 3

# Agent connection monitoring
wazuh_agents_disconnection_time: "10m"
wazuh_agents_disconnection_alert_time: 0

# Output size limit
wazuh_max_output_size: "20M"

# GeoIP database (optional - for IP geolocation in alerts)
# wazuh_geoip_database: "/var/ossec/etc/GeoLite2-City.mmdb"

# Global settings
wazuh_manager_max_agents: 14000
wazuh_manager_memory_size: 8192

# Vulnerability detector
wazuh_vulnerability_detection_enabled: true
wazuh_vulnerability_detection_interval: "5m"
wazuh_vulnerability_detection_min_full_scan_interval: "6h"

# File integrity monitoring
wazuh_fim_enabled: true
wazuh_fim_frequency: 43200
wazuh_fim_directories:
  - /etc
  - /usr/bin
  - /usr/sbin
  - /bin
  - /sbin
  - /boot

# Rootcheck
wazuh_rootkit_detection_enabled: true
wazuh_rootcheck_frequency: 43200

# Log collection defaults
wazuh_log_collection_enabled: true

# Active response
wazuh_active_response_enabled: true
wazuh_active_response_ca_verification: true

# Security Configuration Assessment (SCA)
wazuh_sca_enabled: true
wazuh_sca_interval: "12h"

# System inventory (Syscollector)
wazuh_syscollector_enabled: true
wazuh_syscollector_interval: "1h"

# Osquery integration (disabled by default - requires osquery installation)
wazuh_osquery_enabled: false
wazuh_osquery_log_path: "/var/log/osquery/osqueryd.results.log"
wazuh_osquery_config_path: "/etc/osquery/osquery.conf"

# CIS-CAT integration (disabled by default - requires CIS-CAT download)
wazuh_ciscat_enabled: false
wazuh_ciscat_timeout: 1800
wazuh_ciscat_interval: "1d"
wazuh_ciscat_scan_on_start: true
wazuh_ciscat_java_path: "wodles/java"
wazuh_ciscat_path: "wodles/ciscat"

# Integrations - Slack, VirusTotal, PagerDuty, etc.
# Example:
# wazuh_integrations:
#   - name: slack
#     hook_url: "https://hooks.slack.com/services/xxx"
#     level: 10
#     alert_format: json
#   - name: virustotal
#     api_key: "your-api-key"
#     level: 7
#     group: "syscheck"
#   - name: pagerduty
#     api_key: "your-api-key"
#     level: 12
wazuh_integrations: []

# Syslog output - forward alerts to external SIEM
wazuh_syslog_output_enabled: false
wazuh_syslog_output_server: ""
wazuh_syslog_output_port: 514
wazuh_syslog_output_format: "default"  # default, json, cef
# Optional filters:
# wazuh_syslog_output_level: 7
# wazuh_syslog_output_group: "authentication_success"
# wazuh_syslog_output_rule_id: "5715"

# AWS CloudTrail, CloudWatch, VPC Flow Logs, etc.
wazuh_aws_enabled: false
wazuh_aws_interval: "10m"
wazuh_aws_run_on_start: true
wazuh_aws_skip_on_error: true
# AWS S3 buckets - examples:
# wazuh_aws_buckets:
#   - name: "my-cloudtrail-bucket"
#     type: "cloudtrail"
#     aws_profile: "default"           # or use access_key/secret_key
#     # access_key: "AKIAIOSFODNN7EXAMPLE"
#     # secret_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
#     # iam_role_arn: "arn:aws:iam::123456789012:role/my-role"
#     path: "AWSLogs/123456789012"
#     only_logs_after: "2024-01-01"
#     regions:
#       - us-east-1
#       - us-west-2
#   - name: "my-vpc-bucket"
#     type: "vpcflow"
#     aws_profile: "default"
# wazuh_aws_services:
#   - type: "cloudwatchlogs"
#     aws_profile: "default"
#     regions:
#       - us-east-1
#     aws_log_groups:
#       - /aws/lambda/my-function
wazuh_aws_buckets: []
wazuh_aws_services: []

# Azure Log Analytics, Activity Logs, and Storage
wazuh_azure_enabled: false
wazuh_azure_interval: "1h"
wazuh_azure_run_on_start: true
# Azure Log Analytics - examples:
# wazuh_azure_log_analytics:
#   - application_id: "your-app-id"
#     application_key: "your-app-key"
#     tenantdomain: "your-tenant.onmicrosoft.com"
#     requests:
#       - tag: "azure-signin"
#         query: "SigninLogs"
#         workspace: "your-workspace-id"
#         time_offset: "1d"
# wazuh_azure_graph:
#   - application_id: "your-app-id"
#     application_key: "your-app-key"
#     tenantdomain: "your-tenant.onmicrosoft.com"
#     requests:
#       - tag: "azure-audit"
#         query: "auditLogs/directoryAudits"
# wazuh_azure_storage:
#   - account_name: "mystorageaccount"
#     account_key: "your-storage-key"
#     tag: "azure-storage"
#     containers:
#       - name: "insights-logs"
#         blobs: ".json"
#         content_type: "json"
wazuh_azure_log_analytics: []
wazuh_azure_graph: []
wazuh_azure_storage: []

# Google Cloud Platform Pub/Sub
wazuh_gcp_enabled: false
wazuh_gcp_interval: "1m"
wazuh_gcp_run_on_start: true
wazuh_gcp_pull_on_start: true
wazuh_gcp_logging: "info"
# GCP Pub/Sub settings - required when wazuh_gcp_enabled: true
# wazuh_gcp_project_id: "my-project"
# wazuh_gcp_subscription_name: "wazuh-subscription"
# wazuh_gcp_credentials_file: "/var/ossec/etc/gcp-credentials.json"
# wazuh_gcp_max_messages: 100
# wazuh_gcp_num_threads: 1

# Google Cloud Storage Bucket
wazuh_gcp_bucket_enabled: false
wazuh_gcp_bucket_interval: "1h"
wazuh_gcp_bucket_run_on_start: true
# GCS buckets - examples:
# wazuh_gcp_buckets:
#   - name: "my-access-logs-bucket"
#     type: "access_logs"
#     credentials_file: "/var/ossec/etc/gcp-credentials.json"
#     prefix: "logs/"
#     only_logs_after: "2024-01-01"
wazuh_gcp_buckets: []

# Docker Listener - Monitor Docker events
wazuh_docker_listener_enabled: false
wazuh_docker_listener_interval: "10m"
wazuh_docker_listener_attempts: 5
wazuh_docker_listener_run_on_start: true

# Office 365 Integration - Azure AD and Office 365 audit logs
wazuh_office365_enabled: false
wazuh_office365_interval: "1m"
wazuh_office365_run_on_start: true
wazuh_office365_curl_max_size: 1048576
wazuh_office365_only_future_events: true
# Office 365 tenants - examples:
# wazuh_office365_tenants:
#   - tenant_id: "your-tenant-id"
#     client_id: "your-client-id"
#     client_secret: "your-client-secret"
#     api_type: "commercial"  # or "gcc", "gcc-high"
#     subscriptions:
#       - "Audit.AzureActiveDirectory"
#       - "Audit.Exchange"
#       - "Audit.SharePoint"
#       - "Audit.General"
#       - "DLP.All"
wazuh_office365_tenants: []

# GitHub Integration - GitHub audit logs for enterprise
wazuh_github_enabled: false
wazuh_github_interval: "10m"
wazuh_github_run_on_start: true
wazuh_github_time_delay: "1m"
wazuh_github_curl_max_size: 1048576
wazuh_github_only_future_events: true
# GitHub organizations - examples:
# wazuh_github_organizations:
#   - name: "my-organization"
#     api_token: "ghp_xxxxxxxxxxxx"
#     event_type: "all"  # or "git", "web", "all"
wazuh_github_organizations: []

# Command Monitoring - Execute commands and monitor output
wazuh_command_monitoring_enabled: false
# Command monitoring commands - examples:
# wazuh_command_monitoring_commands:
#   - tag: "check-disk-space"
#     command: "df -h"
#     interval: "1h"
#     run_on_start: true
#   - tag: "check-users"
#     command: "who"
#     interval: "30m"
wazuh_command_monitoring_commands: []

# ═══════════════════════════════════════════════════════════════
# Anti-Flooding / Performance Tuning
# ═══════════════════════════════════════════════════════════════
# These settings control event rate limiting and queue sizes to prevent
# agent flooding from overwhelming the manager. Tune based on your
# deployment size and hardware.

# -- Manager Global EPS Limit (analysisd) --
# Maximum events per second the analysis engine will process
# 0 = unlimited (default). Set to a value if you need to cap processing.
# For large deployments (500+ agents), consider 5000-10000
wazuh_analysisd_max_eps: 0
# Timeframe in seconds for EPS calculation (default: 10)
wazuh_analysisd_eps_timeframe: 10

# -- Remote Agent Queue --
# Incoming event queue from agents (remoted daemon)
# If this fills up, agent events are dropped until space is available
# Default 131072 is fine for most deployments (up to ~500 agents)
# For 1000+ agents, consider 262144 or 524288
wazuh_remote_queue_size: 131072
# How long to wait before closing idle agent sessions
wazuh_remote_rids_closing_time: "5m"

# -- FIM Rate Limits --
# File integrity monitoring event processing rate (events/second)
wazuh_fim_max_eps: 200
# FIM database synchronization rate limit
wazuh_fim_sync_max_eps: 10

# -- Internal Options (local_internal_options.conf) --
# Enable deployment of local_internal_options.conf for daemon tuning
wazuh_internal_options_enabled: true

# Analysisd thread counts (0 = auto based on CPU cores)
wazuh_analysisd_event_threads: 0
wazuh_analysisd_rule_matching_threads: 0
wazuh_analysisd_dbsync_threads: 0

# Analysisd internal queue sizes (increase for high-throughput)
# Default 16384 handles ~500 agents. For 1000+ agents, use 32768-65536
wazuh_analysisd_decode_queue_size: 16384
wazuh_analysisd_process_queue_size: 16384
wazuh_analysisd_dbsync_queue_size: 16384

# Remoted daemon tuning
# Worker threads: 1 thread per ~250 active agents (default: 4)
wazuh_remoted_worker_pool: 4
wazuh_remoted_recv_timeout: 1

# Wazuh DB worker threads (0 = auto)
wazuh_db_worker_pool: 0

# Logcollector max files
wazuh_logcollector_max_files: 256

# Additional internal options (advanced - list of key/value pairs)
# Example:
# wazuh_internal_options:
#   - key: "analysisd.min_rotate_interval"
#     value: "600"
#   - key: "remoted.guess_agent_group"
#     value: "0"

# Indexer connection
wazuh_indexer_connection_enabled: true

# Filebeat settings (for alert forwarding to indexer)
wazuh_filebeat_enabled: true
wazuh_filebeat_archives_enabled: false
# Filebeat version - should be compatible with Wazuh version
# See: https://documentation.wazuh.com/current/installation-guide/wazuh-indexer/step-by-step.html
wazuh_filebeat_version: "7.10.2"

# ═══════════════════════════════════════════════════════════════
# Default Agent Groups
# ═══════════════════════════════════════════════════════════════
# Pre-created during deployment so they appear in the Dashboard UI
# immediately. Agents are assigned to groups after enrollment via
# the Dashboard, API, or agent_groups CLI.
#
# Group shared agent.conf is ADDITIVE to the agent's local ossec.conf.
# Only role-specific extras are defined here - the base agent templates
# already handle platform-specific log sources, FIM, and modules.
#
# Override or extend in group_vars/all.yml to customize for your environment.
wazuh_agent_groups:

  # ── Linux Groups ──────────────────────────────────────────────

  - name: "linux-servers"
    os: "Linux"
    description: "General-purpose Linux servers (baseline)"
    config:
      syscheck:
        directories:
          - path: "/opt"
            check_all: true
          - path: "/root/.ssh"
            realtime: true
          - path: "/var/spool/cron"
            realtime: true
            report_changes: true
          - path: "/etc/cron.d"
            realtime: true
            report_changes: true
      localfile:
        - location: "/var/log/faillog"
          format: "syslog"
        - location: "/var/log/lastlog"
          format: "syslog"
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "linux"

  - name: "linux-web-servers"
    os: "Linux"
    description: "Linux web servers (Nginx, Apache, HAProxy)"
    config:
      syscheck:
        directories:
          - path: "/var/www"
            realtime: true
            report_changes: true
          - path: "/etc/nginx"
            realtime: true
            report_changes: true
          - path: "/etc/apache2"
            realtime: true
            report_changes: true
          - path: "/etc/httpd"
            realtime: true
            report_changes: true
          - path: "/etc/haproxy"
            realtime: true
            report_changes: true
          - path: "/etc/letsencrypt"
            check_all: true
        ignore:
          - path: "/var/www/html/cache"
            type: "sregex"
          - "/var/www/html/storage/logs"
          - "/var/www/html/storage/framework/sessions"
      localfile:
        - location: "/var/log/nginx/access.log"
          format: "syslog"
        - location: "/var/log/nginx/error.log"
          format: "syslog"
        - location: "/var/log/apache2/access.log"
          format: "apache"
        - location: "/var/log/apache2/error.log"
          format: "apache"
        - location: "/var/log/httpd/access_log"
          format: "apache"
        - location: "/var/log/httpd/error_log"
          format: "apache"
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "linux"
        - key: "group.role"
          value: "web-server"

  - name: "linux-db-servers"
    os: "Linux"
    description: "Linux database servers (MySQL, PostgreSQL, MongoDB)"
    config:
      syscheck:
        directories:
          - path: "/etc/mysql"
            realtime: true
            report_changes: true
          - path: "/etc/postgresql"
            realtime: true
            report_changes: true
          - path: "/etc/mongod.conf"
            check_all: true
          - path: "/etc/redis"
            realtime: true
            report_changes: true
        ignore:
          - "/var/lib/mysql"
          - "/var/lib/postgresql"
          - "/var/lib/mongodb"
      localfile:
        - location: "/var/log/mysql/error.log"
          format: "syslog"
        - location: "/var/log/mysql/slow-query.log"
          format: "syslog"
        - location: "/var/log/postgresql/postgresql-*.log"
          format: "syslog"
        - location: "/var/log/mongodb/mongod.log"
          format: "json"
        - location: "/var/log/redis/redis-server.log"
          format: "syslog"
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "linux"
        - key: "group.role"
          value: "database"

  - name: "linux-docker-hosts"
    os: "Linux"
    description: "Linux Docker/container hosts"
    config:
      syscheck:
        directories:
          - path: "/etc/docker"
            realtime: true
            report_changes: true
          - path: "/root/.docker"
            check_all: true
          - path: "/etc/containerd"
            realtime: true
            report_changes: true
      localfile:
        - location: "/var/log/docker.log"
          format: "syslog"
      wodle:
        - name: "docker-listener"
          enabled: true
          interval: "60s"
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "linux"
        - key: "group.role"
          value: "docker-host"

  # ── Windows Groups ────────────────────────────────────────────

  - name: "windows-servers"
    os: "Windows"
    description: "General-purpose Windows servers (baseline)"
    config:
      syscheck:
        directories:
          - path: "C:\\Windows\\System32\\inetsrv"
            check_all: true
          - path: "C:\\inetpub\\wwwroot"
            realtime: true
            report_changes: true
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "windows"

  - name: "windows-dc"
    os: "Windows"
    description: "Windows Domain Controllers (Active Directory)"
    config:
      syscheck:
        directories:
          - path: "C:\\Windows\\NTDS"
            check_all: true
          - path: "C:\\Windows\\SYSVOL"
            realtime: true
          - path: "C:\\Windows\\System32\\GroupPolicy"
            realtime: true
            report_changes: true
          - path: "C:\\Windows\\System32\\dns"
            check_all: true
        windows_registry:
          - key: "HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\Services\\NTDS\\Parameters"
            arch: "both"
          - key: "HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\Control\\SecurityProviders"
            arch: "both"
          - key: "HKEY_LOCAL_MACHINE\\System\\CurrentControlSet\\Services\\Netlogon\\Parameters"
            arch: "both"
          - key: "HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\Kerberos"
            arch: "both"
      localfile:
        # Directory Service - filter routine internal processing events (1-8)
        # Keep replication errors (1000+), NTDS events, and security-relevant entries
        - location: "Directory Service"
          format: "eventchannel"
          query: "Event/System[EventID != 1 and EventID != 2 and EventID != 3 and EventID != 4 and EventID != 5 and EventID != 6 and EventID != 7 and EventID != 8]"
        # DNS Server - filter routine query/response events (256-260) that produce
        # thousands of eps on busy DCs. Keep zone transfer, dynamic update, and errors.
        - location: "DNS Server"
          format: "eventchannel"
          query: "Event/System[EventID != 256 and EventID != 257 and EventID != 258 and EventID != 259 and EventID != 260]"
        - location: "DFS Replication"
          format: "eventchannel"
        - location: "Microsoft-Windows-ActiveDirectory_DomainService/Diagnostic"
          format: "eventchannel"
        # Group Policy operational - track GPO application changes
        - location: "Microsoft-Windows-GroupPolicy/Operational"
          format: "eventchannel"
      labels:
        - key: "group.type"
          value: "server"
        - key: "group.os"
          value: "windows"
        - key: "group.role"
          value: "domain-controller"
        - key: "group.criticality"
          value: "critical"

  - name: "windows-workstations"
    os: "Windows"
    description: "Windows end-user desktops and laptops"
    config:
      syscheck:
        directories:
          - path: "C:\\Users\\*\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup"
            realtime: true
          - path: "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Startup"
            realtime: true
          - path: "C:\\Users\\*\\Downloads"
            check_all: true
            restrict: ".*\\.exe$|.*\\.msi$|.*\\.ps1$|.*\\.bat$|.*\\.cmd$|.*\\.vbs$|.*\\.js$"
        ignore:
          - "C:\\Users\\*\\AppData\\Local\\Temp"
          - "C:\\Users\\*\\AppData\\Local\\Microsoft\\Windows\\INetCache"
      localfile:
        - location: "Microsoft-Windows-PrintService/Operational"
          format: "eventchannel"
        - location: "Microsoft-Windows-DeviceGuard/Operational"
          format: "eventchannel"
      labels:
        - key: "group.type"
          value: "workstation"
        - key: "group.os"
          value: "windows"

  # ── macOS Groups ──────────────────────────────────────────────

  - name: "macos-endpoints"
    os: "macOS"
    description: "macOS workstations and laptops"
    config:
      syscheck:
        directories:
          - path: "/Users/*/Library/Preferences"
            check_all: true
          - path: "/Users/*/.zshrc"
            realtime: true
            report_changes: true
          - path: "/Users/*/.bash_profile"
            realtime: true
            report_changes: true
          - path: "/usr/local/Cellar"
            check_all: true
        ignore:
          - "/Users/*/Library/Preferences/ByHost"
          - "/Users/*/Library/Preferences/com.apple.LaunchServices"
      labels:
        - key: "group.type"
          value: "endpoint"
        - key: "group.os"
          value: "macos"

# Log rotation settings
wazuh_log_rotation_enabled: true
wazuh_log_rotation_keep_days: 30
wazuh_log_rotation_max_size: "100M"
wazuh_log_rotation_compress: true
