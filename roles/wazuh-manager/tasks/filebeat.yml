---
# Wazuh Manager - Filebeat Installation and Configuration
# Filebeat forwards alerts from the manager to the Wazuh Indexer
# Indexer credentials are sourced from Ansible Vault via group_vars

- name: Check if Filebeat is already installed
  ansible.builtin.shell: dpkg -l filebeat 2>/dev/null | grep -q '^ii'
  register: filebeat_installed
  changed_when: false
  failed_when: false
  become: true

- name: Download Filebeat OSS package
  ansible.builtin.get_url:
    url: "https://artifacts.elastic.co/downloads/beats/filebeat/filebeat-oss-{{ wazuh_filebeat_version | default('7.10.2') }}-amd64.deb"
    dest: "/tmp/filebeat-oss-{{ wazuh_filebeat_version | default('7.10.2') }}-amd64.deb"
    mode: '0644'
  when: filebeat_installed.rc != 0
  become: true

- name: Install Filebeat OSS
  ansible.builtin.apt:
    deb: "/tmp/filebeat-oss-{{ wazuh_filebeat_version | default('7.10.2') }}-amd64.deb"
    state: present
  when: filebeat_installed.rc != 0
  become: true

- name: Download Wazuh Filebeat module
  ansible.builtin.unarchive:
    src: "https://packages.wazuh.com/4.x/filebeat/wazuh-filebeat-0.4.tar.gz"
    dest: /usr/share/filebeat/module
    remote_src: true
    creates: /usr/share/filebeat/module/wazuh
  become: true

- name: Download Wazuh alerts template
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/wazuh/wazuh/v{{ wazuh_version }}/extensions/elasticsearch/7.x/wazuh-template.json"
    dest: /etc/filebeat/wazuh-template.json
    mode: '0644'
  become: true

- name: Create Filebeat certificates directory
  ansible.builtin.file:
    path: /etc/filebeat/certs
    state: directory
    owner: root
    group: root
    mode: '0700'
  become: true

- name: Copy root CA certificate for Filebeat
  ansible.builtin.copy:
    src: /var/ossec/etc/certs/root-ca.pem
    dest: /etc/filebeat/certs/root-ca.pem
    remote_src: true
    owner: root
    group: root
    mode: '0600'
  become: true

- name: Copy server certificate for Filebeat
  ansible.builtin.copy:
    src: /var/ossec/etc/certs/server.pem
    dest: /etc/filebeat/certs/filebeat.pem
    remote_src: true
    owner: root
    group: root
    mode: '0600'
  become: true

- name: Copy server key for Filebeat
  ansible.builtin.copy:
    src: /var/ossec/etc/certs/server-key.pem
    dest: /etc/filebeat/certs/filebeat-key.pem
    remote_src: true
    owner: root
    group: root
    mode: '0600'
  become: true

- name: Verify Filebeat certificate files
  ansible.builtin.command: openssl x509 -noout -subject -issuer -dates -in /etc/filebeat/certs/{{ item }}
  become: true
  register: filebeat_cert_verify
  changed_when: false
  loop:
    - root-ca.pem
    - filebeat.pem

- name: Verify Filebeat key matches certificate
  ansible.builtin.shell: |
    CERT_MOD=$(openssl x509 -noout -modulus -in /etc/filebeat/certs/filebeat.pem 2>&1 | openssl md5)
    KEY_MOD=$(openssl rsa -noout -modulus -in /etc/filebeat/certs/filebeat-key.pem 2>&1 | openssl md5)
    if [ "$CERT_MOD" = "$KEY_MOD" ]; then echo "MATCH: cert and key modulus match"; else echo "MISMATCH: cert=$CERT_MOD key=$KEY_MOD"; exit 1; fi
  become: true
  register: filebeat_key_match
  changed_when: false

- name: Configure Filebeat
  ansible.builtin.template:
    src: filebeat.yml.j2
    dest: /etc/filebeat/filebeat.yml
    owner: root
    group: root
    mode: '0600'
  become: true
  notify: restart filebeat

# Filebeat 7.10.2 has two Go runtime issues on modern Linux:
#
# 1. pthread_create crash (Go 1.14 + glibc 2.34+/Ubuntu 22.04+):
#    "runtime/cgo: pthread_create failed: Operation not permitted"
#    Fix: Run through filebeat-god wrapper instead of direct execution.
#    filebeat-god is compiled without cgo and manages the child process.
#
# 2. Async preemption crash (Go 1.14 + kernel 6.x+):
#    "runtime: unknown pc" / "reflect.Value.Set" panic during JSON loading.
#    Fix: GODEBUG=asyncpreemptoff=1 disables signal-based preemption.
#
# The package ships a systemd unit (/usr/lib/systemd/system/filebeat.service)
# that runs filebeat directly, triggering crash #1. We override it with a
# custom unit that uses filebeat-god, matching the SysV init script behavior.
# Restart=always with RestartSec=5 handles any intermittent crashes.

- name: Deploy systemd unit for Filebeat (via filebeat-god wrapper)
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Filebeat sends log files to Logstash or directly to Elasticsearch.
      Documentation=https://www.elastic.co/products/beats/filebeat
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=simple
      Environment="GODEBUG=asyncpreemptoff=1"
      Environment="BEAT_LOG_OPTS="
      Environment="BEAT_CONFIG_OPTS=-c /etc/filebeat/filebeat.yml"
      Environment="BEAT_PATH_OPTS=--path.home /usr/share/filebeat --path.config /etc/filebeat --path.data /var/lib/filebeat --path.logs /var/log/filebeat"
      ExecStart=/usr/share/filebeat/bin/filebeat-god -f -r / -n -p /var/run/filebeat.pid -- /usr/share/filebeat/bin/filebeat $BEAT_LOG_OPTS $BEAT_CONFIG_OPTS $BEAT_PATH_OPTS
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/filebeat.service
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Remove legacy systemd drop-in directory for Filebeat
  ansible.builtin.file:
    path: /etc/systemd/system/filebeat.service.d
    state: absent
  become: true

- name: Enable Filebeat service
  ansible.builtin.systemd:
    name: filebeat
    enabled: true
    daemon_reload: true
  become: true

- name: Validate Filebeat configuration
  ansible.builtin.command: >-
    /usr/share/filebeat/bin/filebeat test config
    -c /etc/filebeat/filebeat.yml
    --path.home /usr/share/filebeat
    --path.config /etc/filebeat
    --path.data /var/lib/filebeat
    --path.logs /var/log/filebeat
  become: true
  register: filebeat_config_test
  changed_when: false

- name: Pre-check indexer connectivity before starting Filebeat
  block:
    - name: Verify indexer is reachable from manager
      ansible.builtin.uri:
        url: "https://{{ wazuh_indexer_nodes[0].ip }}:{{ wazuh_indexer_http_port | default(9200) }}/_cluster/health"
        method: GET
        user: "{{ wazuh_indexer_admin_user }}"
        password: "{{ wazuh_indexer_admin_password }}"
        force_basic_auth: true
        validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
      register: indexer_precheck
      retries: 3
      delay: 10
      until: indexer_precheck.status | default(0) == 200
      become: true
  rescue:
    - name: Fail with indexer connectivity diagnosis
      ansible.builtin.fail:
        msg: |
          ══════════════════════════════════════════════════════════════
          CANNOT REACH INDEXER — Filebeat will not start successfully
          ══════════════════════════════════════════════════════════════

          Tried: https://{{ wazuh_indexer_nodes[0].ip }}:{{ wazuh_indexer_http_port | default(9200) }}/_cluster/health

          Check:
          1. Indexer service: systemctl status wazuh-indexer (on indexer node)
          2. Network: curl -k https://{{ wazuh_indexer_nodes[0].ip }}:{{ wazuh_indexer_http_port | default(9200) }}/ (from this host)
          3. Firewall: port {{ wazuh_indexer_http_port | default(9200) }} must be open between manager and indexer
          4. Certificates: verify /etc/filebeat/certs/ files match the indexer CA

          Filebeat will crash-loop if started without indexer connectivity.
          ══════════════════════════════════════════════════════════════

- name: Start Filebeat and verify
  block:
    - name: Reset Filebeat failed state (if rate-limited from previous failures)
      ansible.builtin.command: systemctl reset-failed filebeat
      become: true
      changed_when: false
      failed_when: false

    - name: Restart Filebeat service
      ansible.builtin.systemd:
        name: filebeat
        state: restarted
      become: true

    - name: Verify Filebeat service is running
      ansible.builtin.systemd:
        name: filebeat
      become: true
      register: filebeat_service_status
      until: >-
        filebeat_service_status.status.ActiveState == "active"
        and filebeat_service_status.status.SubState == "running"
      retries: 12
      delay: 5
  rescue:
    - name: Collect Filebeat journal logs (full crash output)
      ansible.builtin.command: journalctl -u filebeat --no-pager -n 200
      become: true
      register: filebeat_journal
      changed_when: false

    - name: Collect Filebeat version info
      ansible.builtin.command: /usr/share/filebeat/bin/filebeat version
      become: true
      register: filebeat_version_info
      changed_when: false
      failed_when: false

    - name: Collect system info
      ansible.builtin.shell: |
        echo "=== OS ===" && cat /etc/os-release | head -5
        echo "=== GLIBC ===" && ldd --version 2>&1 | head -1
        echo "=== OPENSSL ===" && openssl version
        echo "=== CERTS ===" && ls -la /etc/filebeat/certs/
        echo "=== MODULE ===" && ls -la /usr/share/filebeat/module/wazuh/ 2>&1 | head -5
        echo "=== TEMPLATE ===" && ls -la /etc/filebeat/wazuh-template.json
      become: true
      register: system_info
      changed_when: false
      failed_when: false

    - name: Collect Filebeat config test output
      ansible.builtin.command: >-
        /usr/share/filebeat/bin/filebeat test config
        -c /etc/filebeat/filebeat.yml
        --path.home /usr/share/filebeat
        --path.config /etc/filebeat
        --path.data /var/lib/filebeat
        --path.logs /var/log/filebeat
      become: true
      register: filebeat_config_retest
      changed_when: false
      failed_when: false

    - name: Collect Filebeat test output
      ansible.builtin.command: >-
        /usr/share/filebeat/bin/filebeat test output
        -c /etc/filebeat/filebeat.yml
        --path.home /usr/share/filebeat
        --path.config /etc/filebeat
        --path.data /var/lib/filebeat
        --path.logs /var/log/filebeat
      become: true
      register: filebeat_output_test
      changed_when: false
      failed_when: false

    - name: Show rendered Filebeat config (redacted)
      ansible.builtin.command: grep -n -v password /etc/filebeat/filebeat.yml
      become: true
      register: filebeat_config_content
      changed_when: false
      failed_when: false

    - name: Fail with diagnostic info
      ansible.builtin.fail:
        msg: |
          Filebeat failed to start on {{ inventory_hostname }}.

          === FILEBEAT VERSION ===
          {{ filebeat_version_info.stdout | default('unknown') }}

          === SYSTEM INFO ===
          {{ system_info.stdout | default('unknown') }}

          === CONFIG TEST ===
          {{ filebeat_config_retest.stdout | default('') }}
          {{ filebeat_config_retest.stderr | default('') }}

          === OUTPUT TEST ===
          {{ filebeat_output_test.stdout | default('') }}
          {{ filebeat_output_test.stderr | default('') }}

          === JOURNAL LOGS (last 200 lines) ===
          {{ filebeat_journal.stdout | default('No journal output available') }}

          === CONFIG FILE (password redacted) ===
          {{ filebeat_config_content.stdout | default('Could not read config') }}

- name: Wait for Filebeat to start sending data
  ansible.builtin.pause:
    seconds: 5
