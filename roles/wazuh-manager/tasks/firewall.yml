---
# Wazuh Manager - Firewall Configuration

- name: Check if firewalld is installed
  ansible.builtin.command: which firewall-cmd
  register: firewalld_check
  changed_when: false
  failed_when: false

- name: Check if ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

# Auto-detect network subnet from default interface
- name: Get default network interface info
  ansible.builtin.set_fact:
    default_interface: "{{ ansible_default_ipv4.interface | default('eth0') }}"
    default_ip: "{{ ansible_default_ipv4.address | default('0.0.0.0') }}"
    default_netmask: "{{ ansible_default_ipv4.netmask | default('255.255.255.0') }}"
    default_network: "{{ ansible_default_ipv4.network | default('0.0.0.0') }}"

- name: Calculate CIDR prefix from netmask
  ansible.builtin.set_fact:
    cidr_prefix: "{{ (default_netmask | ansible.utils.ipaddr('prefix')) | default(24) }}"

- name: Set auto-detected subnet
  ansible.builtin.set_fact:
    auto_detected_subnet: "{{ default_network }}/{{ cidr_prefix }}"

- name: Display detected network
  ansible.builtin.debug:
    msg: "Auto-detected subnet: {{ auto_detected_subnet }} (Interface: {{ default_interface }}, IP: {{ default_ip }})"

# Use auto-detected subnet if not explicitly configured
- name: Set allowed networks (use auto-detect if not configured)
  ansible.builtin.set_fact:
    effective_agent_networks: "{{ wazuh_allowed_agent_networks | default([auto_detected_subnet]) }}"
    effective_cluster_networks: "{{ wazuh_allowed_cluster_networks | default([auto_detected_subnet]) }}"

# Install UFW on Debian/Ubuntu if not present and no firewalld
- name: Install UFW (Debian/Ubuntu)
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
  become: true
  when:
    - ansible_os_family == 'Debian'
    - ufw_check.rc != 0
    - firewalld_check.rc != 0

- name: Re-check if ufw is installed after installation
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'Debian'

- name: Check if UFW is active
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false
  when: ufw_check.rc == 0
  become: true

# Allow SSH first before enabling UFW to prevent lockout
- name: Pre-enable - Allow SSH port via iptables (prevent lockout)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 22
    jump: ACCEPT
  become: true
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'inactive' in ufw_status.stdout.lower()"
  ignore_errors: true

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'inactive' in ufw_status.stdout.lower()"

- name: Set UFW default allow outgoing
  community.general.ufw:
    policy: allow
    direction: outgoing
  become: true
  when:
    - ufw_check.rc == 0

- name: Re-check UFW status after enabling
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false
  when: ufw_check.rc == 0
  become: true

# UFW (Debian/Ubuntu)
- name: Configure UFW rules
  when:
    - ufw_check.rc == 0
    - ufw_status.stdout is defined
    - "'active' in ufw_status.stdout.lower()"
  block:
    - name: Allow SSH from anywhere
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: true

    # Agent communication - allow from auto-detected/configured agent subnets (TCP)
    - name: Allow Wazuh agent communication (1514/tcp) from agent networks
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_manager_agent_port | default(1514) }}"
        proto: tcp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_agent_networks }}"

    # Agent communication - allow from auto-detected/configured agent subnets (UDP)
    - name: Allow Wazuh agent communication (1514/udp) from agent networks
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_manager_agent_port | default(1514) }}"
        proto: udp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_agent_networks }}"

    # Agent registration - allow from agent subnets
    - name: Allow Wazuh agent registration (1515/tcp) from agent networks
      community.general.ufw:
        rule: allow
        port: "1515"
        proto: tcp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_agent_networks }}"

    # API - allow from cluster networks (dashboard, other managers)
    - name: Allow Wazuh API port from cluster networks
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_manager_api_port }}"
        proto: tcp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_cluster_networks }}"

    # Cluster communication - only if clustering enabled
    - name: Allow Wazuh cluster port from cluster networks (multi-node)
      community.general.ufw:
        rule: allow
        port: "{{ wazuh_manager_cluster_port | default(1516) }}"
        proto: tcp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_cluster_networks }}"
      when: wazuh_manager_cluster_enabled | default(false)

    # Syslog - if enabled, allow from agent networks
    - name: Allow Syslog port (514/udp) from agent networks
      community.general.ufw:
        rule: allow
        port: "514"
        proto: udp
        from_ip: "{{ item }}"
      become: true
      loop: "{{ effective_agent_networks }}"
      when: wazuh_syslog_output_enabled | default(false)

# Firewalld (RHEL/CentOS)
- name: Configure firewalld rules
  when: firewalld_check.rc == 0
  block:
    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      become: true

    - name: Allow SSH
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
      become: true

    - name: Allow Wazuh Manager agent communication port (1514/tcp)
      ansible.posix.firewalld:
        port: "{{ wazuh_manager_agent_port | default(1514) }}/tcp"
        permanent: true
        state: enabled
      become: true

    - name: Allow Wazuh Manager agent communication port (1514/udp)
      ansible.posix.firewalld:
        port: "{{ wazuh_manager_agent_port | default(1514) }}/udp"
        permanent: true
        state: enabled
      become: true

    - name: Allow Wazuh Manager registration port (1515)
      ansible.posix.firewalld:
        port: "1515/tcp"
        permanent: true
        state: enabled
      become: true

    - name: Allow Wazuh API port
      ansible.posix.firewalld:
        port: "{{ wazuh_manager_api_port }}/tcp"
        permanent: true
        state: enabled
      become: true

    - name: Allow Wazuh cluster port (for multi-node)
      ansible.posix.firewalld:
        port: "{{ wazuh_manager_cluster_port | default(1516) }}/tcp"
        permanent: true
        state: enabled
      become: true
      when: wazuh_manager_cluster_enabled | default(false)

    - name: Reload firewalld
      ansible.builtin.command: firewall-cmd --reload
      become: true
      changed_when: true
