---
# Wazuh Manager - Configuration

- name: Configure ossec.conf from template
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: wazuh
    group: wazuh
    mode: '0640'
    backup: true
  become: true
  notify: restart wazuh-manager

# Read indexer password from credentials file if not defined
- name: Check for indexer credentials file
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/credentials/indexer_admin_password.txt"
  delegate_to: localhost
  become: false
  register: indexer_creds_file
  vars:
    ansible_become: false

- name: Read indexer password from credentials file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/credentials/indexer_admin_password.txt"
  delegate_to: localhost
  become: false
  register: indexer_creds_content
  when:
    - indexer_creds_file.stat.exists
    - wazuh_indexer_admin_password is not defined
  vars:
    ansible_become: false

- name: Extract indexer password from credentials file
  ansible.builtin.set_fact:
    wazuh_indexer_admin_password: "{{ indexer_creds_content.content | b64decode | regex_search('Password: (.+)', '\\1') | first }}"
  when:
    - indexer_creds_content is defined
    - indexer_creds_content.content is defined
  no_log: true

- name: Configure Wazuh keystore for indexer username
  ansible.builtin.shell: |
    set -o pipefail
    echo 'admin' | /var/ossec/bin/wazuh-keystore -f indexer -k username
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  no_log: true
  when: wazuh_indexer_connection_enabled | default(true)

- name: Configure Wazuh keystore for indexer password
  ansible.builtin.shell: |
    set -o pipefail
    echo '{{ wazuh_indexer_admin_password }}' | /var/ossec/bin/wazuh-keystore -f indexer -k password
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  no_log: true
  when:
    - wazuh_indexer_connection_enabled | default(true)
    - wazuh_indexer_admin_password is defined

- name: Configure local rules directory
  ansible.builtin.file:
    path: /var/ossec/etc/rules
    state: directory
    owner: wazuh
    group: wazuh
    mode: '0750'
  become: true

- name: Configure local decoders directory
  ansible.builtin.file:
    path: /var/ossec/etc/decoders
    state: directory
    owner: wazuh
    group: wazuh
    mode: '0750'
  become: true

- name: Set correct permissions on /var/ossec writable directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: wazuh
    group: wazuh
    recurse: true
  loop:
    - /var/ossec/etc
    - /var/ossec/logs
    - /var/ossec/queue
    - /var/ossec/var
    - /var/ossec/tmp
    - /var/ossec/stats
  become: true
