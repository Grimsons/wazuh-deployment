---
# Wazuh Manager Role - Main Tasks

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      skip: true

- name: Install prerequisites
  ansible.builtin.include_tasks: prerequisites.yml

- name: Configure Wazuh repository
  ansible.builtin.include_tasks: repository.yml

- name: Install Wazuh Manager
  ansible.builtin.include_tasks: install.yml

- name: Deploy certificates
  ansible.builtin.include_tasks: certificates.yml

- name: Configure Wazuh Manager
  ansible.builtin.include_tasks: configure.yml

- name: Configure agent enrollment password
  ansible.builtin.include_tasks: agent_enrollment.yml
  when: wazuh_authd_use_password | default(true)

- name: Deploy custom rules and decoders
  ansible.builtin.include_tasks: custom_rules.yml
  when: wazuh_custom_content_enabled | default(false)

- name: Configure Wazuh API
  ansible.builtin.include_tasks: api.yml

- name: Configure cluster
  ansible.builtin.include_tasks: cluster.yml
  when: wazuh_manager_cluster_enabled | default(false)

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
  when: wazuh_configure_firewall | default(false)

- name: Enable Wazuh Manager service
  ansible.builtin.systemd:
    name: "{{ wazuh_manager_service_name }}"
    enabled: true
    daemon_reload: true
  become: true

- name: Start Wazuh Manager service (non-blocking)
  ansible.builtin.systemd:
    name: "{{ wazuh_manager_service_name }}"
    state: started
    no_block: true
  become: true

- name: Wait for Wazuh Manager to be listening
  ansible.builtin.wait_for:
    port: 1514
    host: "{{ ansible_default_ipv4.address }}"
    delay: "{{ wazuh_api_check_delay }}"
    timeout: "{{ wazuh_service_start_timeout }}"
  become: true

- name: Verify Wazuh Manager service is running
  ansible.builtin.systemd:
    name: "{{ wazuh_manager_service_name }}"
  become: true
  register: manager_service_status
  until: manager_service_status.status.ActiveState == "active"
  retries: "{{ wazuh_api_check_retries }}"
  delay: "{{ wazuh_api_check_delay }}"

- name: Wait for Wazuh Manager API to be ready
  ansible.builtin.uri:
    url: "https://{{ ansible_default_ipv4.address }}:{{ wazuh_manager_api_port }}/security/user/authenticate"
    method: POST
    user: "{{ wazuh_api_user }}"
    password: "{{ wazuh_api_default_password }}"
    force_basic_auth: true
    validate_certs: "{{ wazuh_ssl_verify_certificates | default(false) }}"
    status_code: [200, 401]
  register: wazuh_api_check
  until: wazuh_api_check.status in [200, 401]
  retries: "{{ wazuh_api_check_retries | default(30) }}"
  delay: "{{ wazuh_api_check_delay | default(10) }}"
  when: manager_node_type | default('master') == 'master'
  no_log: true

# Configure secure API password (run only on master)
- name: Configure secure API password
  ansible.builtin.include_tasks: security_users.yml
  when: manager_node_type | default('master') == 'master'

# Agent groups require the API to be running with the final password
- name: Configure agent groups
  ansible.builtin.include_tasks: agent_groups.yml
  when:
    - wazuh_agent_groups | default([]) | length > 0
    - manager_node_type | default('master') == 'master'

- name: Install and configure Filebeat for alert forwarding
  ansible.builtin.include_tasks: filebeat.yml
  when:
    - wazuh_filebeat_enabled | default(true)
    - manager_node_type | default('master') == 'master'

- name: Configure log rotation
  ansible.builtin.include_tasks: log_rotation.yml
  when: wazuh_log_rotation_enabled | default(true)

- name: Display Manager deployment result
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════
      Wazuh Manager is ready!
      API URL: https://{{ ansible_default_ipv4.address }}:{{ wazuh_manager_api_port }}
      Credentials: Managed by Ansible Vault (group_vars/all/vault.yml)
      ═══════════════════════════════════════════════════════════════
  when: manager_node_type | default('master') == 'master'
  run_once: true
