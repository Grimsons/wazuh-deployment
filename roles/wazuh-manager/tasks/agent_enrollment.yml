---
# Wazuh Manager - Agent Enrollment Password Setup
# Creates the authd.pass file required for password-based agent enrollment
# Password MUST be defined in Ansible vault (wazuh_agent_enrollment_password)

- name: Validate enrollment password is defined in vault
  ansible.builtin.fail:
    msg: |
      Agent enrollment password is required but not defined.

      Please add 'wazuh_agent_enrollment_password' to your Ansible vault:
        ansible-vault edit group_vars/all/vault.yml

      Example:
        vault_wazuh_agent_enrollment_password: "YourSecurePassword"

      And reference it in your variables:
        wazuh_agent_enrollment_password: "{{ '{{' }} vault_wazuh_agent_enrollment_password {{ '}}' }}"
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is not defined or wazuh_agent_enrollment_password | length == 0

- name: Create authd.pass file for agent enrollment
  ansible.builtin.copy:
    content: "{{ wazuh_agent_enrollment_password }}"
    dest: /var/ossec/etc/authd.pass
    owner: wazuh
    group: wazuh
    mode: '0640'
  become: true
  notify: restart wazuh-manager
  when:
    - wazuh_authd_use_password | default(true)
    - wazuh_agent_enrollment_password is defined
    - wazuh_agent_enrollment_password | length > 0

- name: Verify authd.pass file exists
  ansible.builtin.stat:
    path: /var/ossec/etc/authd.pass
  become: true
  register: authd_pass_file
  when: wazuh_authd_use_password | default(true)

- name: Fail if authd.pass is required but missing
  ansible.builtin.fail:
    msg: |
      Agent enrollment password is enabled (wazuh_authd_use_password=true) but
      the password file /var/ossec/etc/authd.pass could not be created.
      Please check permissions and ensure wazuh_agent_enrollment_password is set in vault.
  when:
    - wazuh_authd_use_password | default(true)
    - not authd_pass_file.stat.exists | default(false)

- name: Display agent enrollment info
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════
      Agent Enrollment Password configured!

      Password file: /var/ossec/etc/authd.pass (on manager)
      Password source: Ansible Vault (wazuh_agent_enrollment_password)

      To enroll agents manually, use:
        WAZUH_MANAGER='{{ ansible_default_ipv4.address }}' \
        WAZUH_REGISTRATION_PASSWORD='<password-from-vault>' \
        apt install wazuh-agent

      Or deploy agents via Ansible which will automatically use the vault password.
      ═══════════════════════════════════════════════════════════════
  run_once: true
  when: wazuh_authd_use_password | default(true)
