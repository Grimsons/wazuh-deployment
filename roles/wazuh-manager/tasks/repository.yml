---
# Wazuh Manager - Repository Configuration

- name: Ensure keyrings directory exists (Debian/Ubuntu)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_os_family == 'Debian'

- name: Download Wazuh GPG key (Debian/Ubuntu)
  ansible.builtin.get_url:
    url: "{{ wazuh_repo_gpg_key }}"
    dest: /etc/apt/keyrings/wazuh.gpg
    mode: '0644'
  become: true
  when: ansible_os_family == 'Debian'

- name: Dearmor Wazuh GPG key if needed (Debian/Ubuntu)
  ansible.builtin.shell: |
    set -o pipefail
    if head -c 5 /etc/apt/keyrings/wazuh.gpg | grep -q '^\-\-\-\-\-'; then
      gpg --dearmor < /etc/apt/keyrings/wazuh.gpg > /etc/apt/keyrings/wazuh.gpg.tmp && mv /etc/apt/keyrings/wazuh.gpg.tmp /etc/apt/keyrings/wazuh.gpg
      echo "Key dearmored"
    else
      echo "Key already in binary format"
    fi
  args:
    executable: /bin/bash
  become: true
  register: dearmor_result
  changed_when: "'dearmored' in dearmor_result.stdout"
  when: ansible_os_family == 'Debian'

- name: Remove legacy apt-key entry if present (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: "{{ wazuh_repo_gpg_key }}"
    state: absent
  become: true
  when: ansible_os_family == 'Debian'
  ignore_errors: true

- name: Add Wazuh repository with signed-by (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/wazuh.gpg] {{ wazuh_repo_url_apt }} stable main"
    state: present
    filename: wazuh
    update_cache: true
  become: true
  when: ansible_os_family == 'Debian'

- name: Import Wazuh GPG key (RHEL/CentOS)
  ansible.builtin.rpm_key:
    key: "{{ wazuh_repo_gpg_key }}"
    state: present
  become: true
  when: ansible_os_family == 'RedHat'

- name: Add Wazuh repository (RHEL/CentOS)
  ansible.builtin.yum_repository:
    name: wazuh
    description: Wazuh repository
    baseurl: "{{ wazuh_repo_url_yum }}"
    gpgcheck: true
    gpgkey: "{{ wazuh_repo_gpg_key }}"
    enabled: true
  become: true
  when: ansible_os_family == 'RedHat'
