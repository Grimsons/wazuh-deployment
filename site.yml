---
# Wazuh Ansible Deployment - Main Site Playbook
# This playbook deploys the complete Wazuh stack in the correct order

- name: Wazuh Deployment - Pre-flight Checks
  hosts: all
  gather_facts: true
  tasks:
    - name: Display deployment information
      ansible.builtin.debug:
        msg: |
          Starting Wazuh Deployment
          ══════════════════════════════════════════════
          Wazuh Version: {{ wazuh_version }}
          Environment: {{ environment_name | default('production') }}
          Organization: {{ organization_name | default('N/A') }}
          ══════════════════════════════════════════════
      run_once: true

    - name: Verify connectivity to all hosts
      ansible.builtin.ping:

    - name: Gather facts from all hosts
      ansible.builtin.setup:

# Step 1: Deploy Wazuh Indexer
- name: Deploy Wazuh Indexer
  hosts: wazuh_indexers
  become: true
  gather_facts: true
  roles:
    - role: wazuh-indexer
  tags:
    - indexer
    - wazuh-indexer

# Step 2: Deploy Wazuh Manager
- name: Deploy Wazuh Manager
  hosts: wazuh_managers
  become: true
  gather_facts: true
  roles:
    - role: wazuh-manager
  tags:
    - manager
    - wazuh-manager

# Step 3: Deploy Wazuh Dashboard
- name: Deploy Wazuh Dashboard
  hosts: wazuh_dashboards
  become: true
  gather_facts: true
  roles:
    - role: wazuh-dashboard
  tags:
    - dashboard
    - wazuh-dashboard

# Step 4: Deploy Wazuh Agents (if hosts are defined)
- name: Deploy Wazuh Agents
  hosts: wazuh_agents
  become: true
  gather_facts: true
  roles:
    - role: wazuh-agent
  tags:
    - agent
    - wazuh-agent

# Post-deployment: Lock down the ansible deployment user
- name: Wazuh Deployment - Security Lockdown
  hosts: all
  become: true
  gather_facts: false
  tags:
    - lockdown
    - security
  tasks:
    - name: Check if lockdown is enabled
      ansible.builtin.set_fact:
        do_lockdown: "{{ wazuh_lockdown_deploy_user | default(true) }}"

    - name: Copy lockdown script to target
      ansible.builtin.copy:
        src: scripts/lockdown-ansible-user.sh
        dest: /usr/local/bin/wazuh-lockdown-deploy
        mode: '0755'
        owner: root
        group: root
      when: do_lockdown | bool

    - name: Execute lockdown script
      ansible.builtin.command:
        cmd: /usr/local/bin/wazuh-lockdown-deploy
      environment:
        ANSIBLE_USER: "{{ ansible_user }}"
      register: lockdown_result
      changed_when: lockdown_result.rc == 0
      when: do_lockdown | bool

    - name: Display lockdown status
      ansible.builtin.debug:
        msg: "Deployment user '{{ ansible_user }}' has been locked down on {{ inventory_hostname }}"
      when: do_lockdown | bool

# Post-deployment: Setup automated maintenance (backup & log cleanup cron jobs)
- name: Wazuh Deployment - Maintenance Cron Setup
  import_playbook: playbooks/setup-maintenance-cron.yml
  tags:
    - maintenance
    - cron
    - backup

# Post-deployment Summary
- name: Wazuh Deployment - Summary
  hosts: all
  gather_facts: false
  tasks:
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════════════════════
                        WAZUH DEPLOYMENT COMPLETE
          ══════════════════════════════════════════════════════════════

          Wazuh Dashboard URL: https://{{ groups['wazuh_dashboards'][0] }}:{{ wazuh_dashboard_port | default(443) }}

          Credentials:
            Dashboard User: {{ wazuh_dashboard_admin_user | default('admin') }}
            Dashboard Pass: [STORED IN ./credentials/indexer_admin_password.txt]

          Wazuh API URL: https://{{ groups['wazuh_managers'][0] }}:{{ wazuh_manager_api_port | default(55000) }}
            API User: {{ wazuh_api_user | default('wazuh') }}
            API Pass: [STORED IN ./credentials/api_password.txt]

          Manager Nodes:
          {% for host in groups['wazuh_managers'] %}
            - {{ host }}
          {% endfor %}

          Indexer Nodes:
          {% for host in groups['wazuh_indexers'] %}
            - {{ host }}
          {% endfor %}

          ══════════════════════════════════════════════════════════════
          MAINTENANCE:
          - Automated backups: {{ wazuh_backup_schedule | default('daily') }}
          {% if wazuh_backup_schedule | default('daily') != 'disabled' %}
          - Backup retention: {{ wazuh_backup_retention | default(7) }} backups
          {% endif %}
          - Log cleanup: {{ 'enabled' if wazuh_log_cleanup_enabled | default(true) else 'disabled' }}
          {% if wazuh_log_cleanup_enabled | default(true) %}
          - Log retention: {{ wazuh_log_retention_days | default(30) }} days
          {% endif %}
          - Logs: ./logs/backup-cron.log, ./logs/log-cleanup-cron.log

          SECURITY NOTES:
          - Passwords are stored in ./credentials/ (mode 0600)
          - Deployment user has been LOCKED DOWN on all hosts
          - Before next deployment, run: ansible-playbook unlock-deploy-user.yml
          ══════════════════════════════════════════════════════════════
      run_once: true
