---
# Wazuh Deployment - Unlock Deployment User
# Run this playbook BEFORE running site.yml to unlock the deployment user
#
# Usage:
#   ansible-playbook unlock-deploy-user.yml
#
# Connects as the bootstrap user (stored in vault) which has full sudo
# access on all hosts, even after the deployment user is locked down.

- name: Unlock Wazuh Deployment User
  hosts: all
  gather_facts: false
  become: true
  vars:
    # Override connection to use the bootstrap user instead of the
    # locked-down wazuh-deploy user (same pattern as site.yml bootstrap play)
    ansible_user: "{{ wazuh_bootstrap_user | default('root') }}"
    ansible_ssh_pass: "{{ vault_ansible_connection_password | default(wazuh_bootstrap_password) | default(omit) }}"
    ansible_ssh_private_key_file: "{{ wazuh_bootstrap_ssh_key | default(omit) }}"
    # The bootstrap user may require a sudo password (unlike wazuh-deploy
    # which has NOPASSWD). The become password is stored in the vault.
    ansible_become_pass: "{{ vault_ansible_become_password | default(vault_ansible_connection_password) | default(omit) }}"
  tasks:
    - name: Check if user is locked down
      ansible.builtin.stat:
        path: /var/lib/wazuh-deploy/.locked
      register: lock_flag

    - name: Display current status
      ansible.builtin.debug:
        msg: "{{ 'User is LOCKED on ' + inventory_hostname + ' - unlocking...' if lock_flag.stat.exists else 'User is already UNLOCKED on ' + inventory_hostname }}"

    - name: Run unlock script
      ansible.builtin.command:
        cmd: /usr/local/bin/wazuh-unlock-deploy
      register: unlock_result
      changed_when: unlock_result.rc == 0
      when: lock_flag.stat.exists

    - name: Verify unlock was successful
      ansible.builtin.stat:
        path: /var/lib/wazuh-deploy/.locked
      register: lock_check

    - name: Confirm unlock status
      ansible.builtin.debug:
        msg: "{{ 'SUCCESS: User unlocked on ' + inventory_hostname if not lock_check.stat.exists else 'WARNING: User may still be locked on ' + inventory_hostname }}"

- name: Unlock Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display next steps
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════════════════════
                      DEPLOYMENT USER UNLOCKED
          ══════════════════════════════════════════════════════════════

          The deployment user has been unlocked on all hosts.
          You can now run the main deployment playbook:

            ansible-playbook site.yml

          After deployment completes, the user will automatically be
          locked down again for security.

          To skip the automatic lockdown, use:

            ansible-playbook site.yml --skip-tags lockdown

          ══════════════════════════════════════════════════════════════
      run_once: true
