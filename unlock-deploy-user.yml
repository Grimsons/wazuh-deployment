---
# Wazuh Deployment - Unlock Deployment User
# Run this playbook BEFORE running site.yml to unlock the deployment user
#
# Usage:
#   ansible-playbook unlock-deploy-user.yml
#
# This playbook uses the 'raw' module to bypass Ansible's Python module
# system entirely. This is necessary because:
# - The locked-down sudoers only allows specific commands (not bare python3)
# - Ansible's pipelining runs 'sudo python3' without a file path, which
#   doesn't match the restricted sudoers rules
# - The 'raw' module sends commands directly over SSH, so 'sudo <command>'
#   in the raw command matches the sudoers rules exactly

- name: Unlock Wazuh Deployment User
  hosts: all
  gather_facts: false
  # Explicitly disable become - we handle sudo directly in raw commands
  # to match the locked-down sudoers rules exactly
  become: false
  tasks:
    - name: Check if user is locked down
      ansible.builtin.raw: test -f /var/lib/wazuh-deploy/.locked && echo "LOCKED" || echo "UNLOCKED"
      register: lock_flag
      changed_when: false

    - name: Display current status
      ansible.builtin.debug:
        msg: "{{ 'User is LOCKED on ' + inventory_hostname + ' - unlocking...' if 'LOCKED' in lock_flag.stdout else 'User is already UNLOCKED on ' + inventory_hostname }}"

    - name: Run unlock script
      ansible.builtin.raw: sudo /usr/local/bin/wazuh-unlock-deploy
      register: unlock_result
      changed_when: unlock_result.rc == 0
      when: "'LOCKED' in lock_flag.stdout"

    - name: Verify unlock was successful
      ansible.builtin.raw: test -f /var/lib/wazuh-deploy/.locked && echo "STILL_LOCKED" || echo "UNLOCKED"
      register: lock_check
      changed_when: false
      when: "'LOCKED' in lock_flag.stdout"

    - name: Confirm unlock status
      ansible.builtin.debug:
        msg: >-
          {{ 'SUCCESS: User unlocked on ' + inventory_hostname
             if (lock_check is skipped or 'UNLOCKED' in (lock_check.stdout | default('')))
             else 'WARNING: User may still be locked on ' + inventory_hostname }}

- name: Unlock Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display next steps
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════════════════════
                      DEPLOYMENT USER UNLOCKED
          ══════════════════════════════════════════════════════════════

          The deployment user has been unlocked on all hosts.
          You can now run the main deployment playbook:

            ansible-playbook site.yml

          After deployment completes, the user will automatically be
          locked down again for security.

          To skip the automatic lockdown, use:

            ansible-playbook site.yml --skip-tags lockdown

          ══════════════════════════════════════════════════════════════
      run_once: true
