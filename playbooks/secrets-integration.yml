---
# Wazuh External Secret Store Integration
# Retrieves secrets from external stores and populates Ansible vault variables
#
# Supported backends:
#   - HashiCorp Vault
#   - AWS Secrets Manager
#   - Azure Key Vault
#   - Environment variables (for CI/CD)
#
# Usage:
#   HashiCorp Vault:
#     ansible-playbook playbooks/secrets-integration.yml -e "secret_backend=hashicorp_vault"
#
#   AWS Secrets Manager:
#     ansible-playbook playbooks/secrets-integration.yml -e "secret_backend=aws_secretsmanager"
#
#   Azure Key Vault:
#     ansible-playbook playbooks/secrets-integration.yml -e "secret_backend=azure_keyvault"
#
#   Environment Variables (CI/CD):
#     export WAZUH_INDEXER_PASSWORD=... WAZUH_API_PASSWORD=...
#     ansible-playbook playbooks/secrets-integration.yml -e "secret_backend=environment"
#
# This playbook populates group_vars/all/vault.yml from external sources,
# solving the "secret zero" problem of needing a vault password to decrypt
# the vault file that contains passwords.

- name: Retrieve Secrets from External Store
  hosts: localhost
  gather_facts: true
  vars:
    secret_backend: "{{ secret_backend | default('environment') }}"
    vault_file: "{{ playbook_dir }}/../group_vars/all/vault.yml"

    # HashiCorp Vault settings
    hashicorp_vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default('https://vault.example.com:8200', true) }}"
    hashicorp_vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default('', true) }}"
    hashicorp_vault_role_id: "{{ lookup('env', 'VAULT_ROLE_ID') | default('', true) }}"
    hashicorp_vault_secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') | default('', true) }}"
    hashicorp_vault_secret_path: "{{ hashicorp_vault_secret_path | default('secret/data/wazuh') }}"

    # AWS Secrets Manager settings
    aws_secret_name: "{{ aws_secret_name | default('wazuh/deployment') }}"
    aws_region: "{{ aws_region | default('us-east-1') }}"

    # Azure Key Vault settings
    azure_vault_name: "{{ azure_vault_name | default('wazuh-keyvault') }}"
    azure_tenant_id: "{{ lookup('env', 'AZURE_TENANT_ID') | default('', true) }}"
    azure_client_id: "{{ lookup('env', 'AZURE_CLIENT_ID') | default('', true) }}"
    azure_client_secret: "{{ lookup('env', 'AZURE_CLIENT_SECRET') | default('', true) }}"

    # Secret field mapping: external_key -> ansible_variable
    secret_mapping:
      indexer_admin_password: vault_indexer_admin_password
      api_password: vault_wazuh_api_password
      authd_password: wazuh_agent_enrollment_password
      cluster_key: wazuh_manager_cluster_key
      dashboard_password: vault_dashboard_password

  tasks:
    # ═══════════════════════════════════════════════════════════════
    # Environment Variables Backend (for CI/CD pipelines)
    # ═══════════════════════════════════════════════════════════════
    - name: "Environment: Retrieve secrets from environment variables"
      ansible.builtin.set_fact:
        retrieved_secrets:
          indexer_admin_password: "{{ lookup('env', 'WAZUH_INDEXER_PASSWORD') }}"
          api_password: "{{ lookup('env', 'WAZUH_API_PASSWORD') }}"
          authd_password: "{{ lookup('env', 'WAZUH_AUTHD_PASSWORD') }}"
          cluster_key: "{{ lookup('env', 'WAZUH_CLUSTER_KEY') }}"
          dashboard_password: "{{ lookup('env', 'WAZUH_DASHBOARD_PASSWORD') }}"
      when: secret_backend == 'environment'
      no_log: true

    # ═══════════════════════════════════════════════════════════════
    # HashiCorp Vault Backend
    # ═══════════════════════════════════════════════════════════════
    - name: "HashiCorp Vault: Retrieve secrets"
      ansible.builtin.set_fact:
        retrieved_secrets: "{{ lookup('community.hashi_vault.hashi_vault',
          hashicorp_vault_secret_path,
          url=hashicorp_vault_addr,
          token=hashicorp_vault_token) }}"
      when: secret_backend == 'hashicorp_vault'
      no_log: true

    # ═══════════════════════════════════════════════════════════════
    # AWS Secrets Manager Backend
    # ═══════════════════════════════════════════════════════════════
    - name: "AWS: Retrieve secrets from Secrets Manager"
      ansible.builtin.set_fact:
        retrieved_secrets: "{{ lookup('amazon.aws.aws_secret',
          aws_secret_name,
          region=aws_region) | from_json }}"
      when: secret_backend == 'aws_secretsmanager'
      no_log: true

    # ═══════════════════════════════════════════════════════════════
    # Azure Key Vault Backend
    # ═══════════════════════════════════════════════════════════════
    - name: "Azure: Retrieve secrets from Key Vault"
      ansible.builtin.set_fact:
        retrieved_secrets:
          indexer_admin_password: "{{ lookup('azure.azcollection.azure_keyvault_secret',
            'wazuh-indexer-password', vault_url='https://' + azure_vault_name + '.vault.azure.net') }}"
          api_password: "{{ lookup('azure.azcollection.azure_keyvault_secret',
            'wazuh-api-password', vault_url='https://' + azure_vault_name + '.vault.azure.net') }}"
          authd_password: "{{ lookup('azure.azcollection.azure_keyvault_secret',
            'wazuh-authd-password', vault_url='https://' + azure_vault_name + '.vault.azure.net') }}"
          cluster_key: "{{ lookup('azure.azcollection.azure_keyvault_secret',
            'wazuh-cluster-key', vault_url='https://' + azure_vault_name + '.vault.azure.net') }}"
          dashboard_password: "{{ lookup('azure.azcollection.azure_keyvault_secret',
            'wazuh-dashboard-password', vault_url='https://' + azure_vault_name + '.vault.azure.net') }}"
      when: secret_backend == 'azure_keyvault'
      no_log: true

    # ═══════════════════════════════════════════════════════════════
    # Validate and Apply Secrets
    # ═══════════════════════════════════════════════════════════════
    - name: Validate retrieved secrets
      ansible.builtin.assert:
        that:
          - retrieved_secrets.indexer_admin_password | default('') | length > 0
          - retrieved_secrets.api_password | default('') | length > 0
        fail_msg: |
          Required secrets are missing from {{ secret_backend }}.
          Ensure the following keys exist:
            - indexer_admin_password
            - api_password
        success_msg: "All required secrets retrieved from {{ secret_backend }}"
      no_log: true

    - name: Generate Ansible vault file from retrieved secrets
      ansible.builtin.copy:
        content: |
          ---
          # Wazuh Deployment Secrets
          # Auto-generated from {{ secret_backend }} on {{ ansible_date_time.iso8601 }}
          # DO NOT EDIT MANUALLY - managed by playbooks/secrets-integration.yml
          {% for ext_key, ansible_var in secret_mapping.items() %}
          {% if retrieved_secrets[ext_key] | default('') | length > 0 %}
          {{ ansible_var }}: "{{ retrieved_secrets[ext_key] }}"
          {% endif %}
          {% endfor %}
        dest: "{{ vault_file }}"
        mode: '0600'
      no_log: true

    - name: Encrypt vault file with ansible-vault
      ansible.builtin.command:
        cmd: ansible-vault encrypt "{{ vault_file }}"
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0 or lookup('file', playbook_dir + '/../.vault_password', errors='ignore') | length > 0
      changed_when: true
      no_log: true

    - name: Summary
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════════════
          Secrets Integration Complete
          ══════════════════════════════════════════════════════════════
          Backend: {{ secret_backend }}
          Vault file: {{ vault_file }}
          Secrets populated: {{ retrieved_secrets.keys() | select('in', secret_mapping.keys()) | list | length }}

          Next steps:
            ansible-playbook site.yml
          ══════════════════════════════════════════════════════════════
