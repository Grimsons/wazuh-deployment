---
# Wazuh Credential Rotation Playbook
# Safely rotates passwords for Wazuh components with minimal downtime
#
# Usage: ansible-playbook playbooks/rotate-credentials.yml
#
# Optional variables:
#   -e "rotate_api=true"           - Rotate Wazuh API password (default: true)
#   -e "rotate_indexer=true"       - Rotate Indexer admin password (default: true)
#   -e "rotate_authd=true"         - Rotate agent enrollment password (default: false)
#   -e "backup_credentials=true"   - Backup current credentials first (default: true)
#   -e "restart_services=true"     - Restart services after rotation (default: true)
#
# WARNING: This playbook modifies production credentials. Ensure you have:
#   - Current vault password access
#   - A recent backup of credentials
#   - Maintenance window scheduled

- name: Credential Rotation - Preparation
  hosts: localhost
  gather_facts: true
  vars:
    rotate_api: true
    rotate_indexer: true
    rotate_authd: false
    backup_credentials: true
  tasks:
    - name: Display rotation plan
      ansible.builtin.debug:
        msg: |
          Credential Rotation Plan:
          ─────────────────────────
          - Wazuh API password:      {{ 'YES' if rotate_api | bool else 'NO' }}
          - Indexer admin password:  {{ 'YES' if rotate_indexer | bool else 'NO' }}
          - Agent enrollment (authd): {{ 'YES' if rotate_authd | bool else 'NO' }}
          ─────────────────────────
          Backup current credentials: {{ 'YES' if backup_credentials | bool else 'NO' }}

    - name: Confirm rotation
      ansible.builtin.pause:
        prompt: "Press ENTER to continue with credential rotation, or Ctrl+C to abort"
      when: not (skip_confirmation | default(false) | bool)

    - name: Set rotation timestamp
      ansible.builtin.set_fact:
        rotation_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"

    - name: Generate new passwords
      ansible.builtin.set_fact:
        new_api_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits,punctuation') | regex_replace('[\"\\\\]', '') }}"
        new_indexer_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits,punctuation') | regex_replace('[\"\\\\]', '') }}"
        new_authd_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
      no_log: true

    - name: Backup current vault
      when: backup_credentials | bool
      block:
        - name: Create credentials backup directory
          ansible.builtin.file:
            path: "{{ playbook_dir }}/../credentials/backup-{{ rotation_timestamp }}"
            state: directory
            mode: '0700'

        - name: Copy current vault to backup
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../group_vars/all/vault.yml"
            dest: "{{ playbook_dir }}/../credentials/backup-{{ rotation_timestamp }}/vault.yml.backup"
            mode: '0600'
          when: "'group_vars/all/vault.yml' is file"

- name: Rotate Wazuh API Password
  hosts: wazuh_managers
  become: true
  serial: 1  # One manager at a time for safety
  vars:
    rotate_api: true
    restart_services: true
  tasks:
    - name: Rotate API password
      when: rotate_api | bool
      block:
        - name: Get current API user
          ansible.builtin.set_fact:
            api_user: "{{ wazuh_api_user | default('wazuh') }}"

        - name: Update Wazuh API user password
          ansible.builtin.command:
            cmd: /var/ossec/framework/python/bin/python3 /var/ossec/framework/scripts/wazuh-security-config.py -u {{ api_user }} -p "{{ hostvars['localhost']['new_api_password'] }}"
          no_log: true
          register: api_update_result
          changed_when: api_update_result.rc == 0
          failed_when: api_update_result.rc != 0

        - name: Restart Wazuh Manager API
          ansible.builtin.systemd:
            name: wazuh-manager
            state: restarted
          when: restart_services | bool

        - name: Wait for API to be available
          ansible.builtin.uri:
            url: "https://localhost:55000/"
            method: GET
            user: "{{ api_user }}"
            password: "{{ hostvars['localhost']['new_api_password'] }}"
            force_basic_auth: true
            validate_certs: false
            status_code: 200
          register: api_check
          until: api_check.status == 200
          retries: 30
          delay: 5
          no_log: true

- name: Rotate Indexer Admin Password
  hosts: wazuh_indexers[0]  # Primary indexer only
  become: true
  vars:
    rotate_indexer: true
  tasks:
    - name: Rotate indexer admin password
      when: rotate_indexer | bool
      block:
        - name: Generate password hash for indexer
          ansible.builtin.command:
            cmd: /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh -p "{{ hostvars['localhost']['new_indexer_password'] }}"
          register: password_hash_output
          no_log: true
          changed_when: false

        - name: Extract password hash
          ansible.builtin.set_fact:
            new_password_hash: "{{ password_hash_output.stdout_lines | last }}"
          no_log: true

        - name: Update internal_users.yml with new hash
          ansible.builtin.lineinfile:
            path: /etc/wazuh-indexer/opensearch-security/internal_users.yml
            regexp: '^(\s+hash:\s+).*'
            line: '    hash: "{{ new_password_hash }}"'
            backrefs: true
          no_log: true

        - name: Apply security configuration
          ansible.builtin.command:
            cmd: >
              /usr/share/wazuh-indexer/bin/indexer-security-init.sh
              -cacert /etc/wazuh-indexer/certs/root-ca.pem
              -cert /etc/wazuh-indexer/certs/admin.pem
              -key /etc/wazuh-indexer/certs/admin-key.pem
              -h localhost
          register: security_init
          changed_when: security_init.rc == 0

        - name: Verify new password works
          ansible.builtin.uri:
            url: "https://localhost:9200/_cluster/health"
            method: GET
            user: admin
            password: "{{ hostvars['localhost']['new_indexer_password'] }}"
            force_basic_auth: true
            validate_certs: false
            status_code: 200
          register: indexer_check
          until: indexer_check.status == 200
          retries: 10
          delay: 5
          no_log: true

- name: Update Dashboard Configuration
  hosts: wazuh_dashboards
  become: true
  vars:
    rotate_indexer: true
    restart_services: true
  tasks:
    - name: Update dashboard with new indexer password
      when: rotate_indexer | bool
      block:
        - name: Update opensearch_dashboards.yml
          ansible.builtin.lineinfile:
            path: /etc/wazuh-dashboard/opensearch_dashboards.yml
            regexp: '^opensearch\.password:'
            line: 'opensearch.password: "{{ hostvars["localhost"]["new_indexer_password"] }}"'
          no_log: true

        - name: Restart Wazuh Dashboard
          ansible.builtin.systemd:
            name: wazuh-dashboard
            state: restarted
          when: restart_services | bool

        - name: Wait for dashboard to be available
          ansible.builtin.uri:
            url: "https://localhost:443/app/wazuh"
            method: GET
            validate_certs: false
            status_code: 200, 302
          register: dashboard_check
          until: dashboard_check.status in [200, 302]
          retries: 30
          delay: 5

- name: Update Filebeat Configuration
  hosts: wazuh_managers
  become: true
  vars:
    rotate_indexer: true
    restart_services: true
  tasks:
    - name: Update filebeat with new indexer password
      when: rotate_indexer | bool
      block:
        - name: Create filebeat keystore password entry
          ansible.builtin.command:
            cmd: filebeat keystore add INDEXER_PASSWORD --stdin --force
            stdin: "{{ hostvars['localhost']['new_indexer_password'] }}"
          no_log: true
          register: keystore_update
          changed_when: keystore_update.rc == 0

        - name: Restart Filebeat
          ansible.builtin.systemd:
            name: filebeat
            state: restarted
          when: restart_services | bool

- name: Rotate Agent Enrollment Password
  hosts: wazuh_managers
  become: true
  serial: 1
  vars:
    rotate_authd: false
  tasks:
    - name: Rotate authd password
      when: rotate_authd | bool
      block:
        - name: Update authd password file
          ansible.builtin.copy:
            content: "{{ hostvars['localhost']['new_authd_password'] }}"
            dest: /var/ossec/etc/authd.pass
            owner: root
            group: wazuh
            mode: '0640'
          no_log: true

        - name: Restart authd
          ansible.builtin.command:
            cmd: /var/ossec/bin/wazuh-control restart
          changed_when: true

- name: Update Ansible Vault
  hosts: localhost
  gather_facts: false
  vars:
    rotate_api: true
    rotate_indexer: true
    rotate_authd: false
  tasks:
    - name: Read current vault
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../group_vars/all/vault.yml"
      register: current_vault_b64
      no_log: true

    - name: Decrypt vault content
      ansible.builtin.set_fact:
        vault_content: "{{ current_vault_b64.content | b64decode }}"
      no_log: true

    - name: Create updated vault file
      ansible.builtin.copy:
        content: |
          ---
          # Wazuh Deployment - Encrypted Credentials
          # Rotated: {{ rotation_timestamp }}
          # WARNING: This file is encrypted with Ansible Vault

          {% if rotate_indexer | bool %}
          vault_wazuh_indexer_admin_password: "{{ new_indexer_password }}"
          {% else %}
          vault_wazuh_indexer_admin_password: "{{ wazuh_indexer_admin_password }}"
          {% endif %}

          {% if rotate_api | bool %}
          vault_wazuh_api_password: "{{ new_api_password }}"
          {% else %}
          vault_wazuh_api_password: "{{ wazuh_api_password }}"
          {% endif %}

          {% if rotate_authd | bool %}
          vault_wazuh_authd_password: "{{ new_authd_password }}"
          {% else %}
          vault_wazuh_authd_password: "{{ wazuh_authd_password | default('') }}"
          {% endif %}

          # Cluster key (unchanged during rotation)
          vault_wazuh_manager_cluster_key: "{{ wazuh_manager_cluster_key | default('') }}"
        dest: "{{ playbook_dir }}/../group_vars/all/vault.yml.new"
        mode: '0600'
      no_log: true

    - name: Encrypt new vault file
      ansible.builtin.command:
        cmd: ansible-vault encrypt "{{ playbook_dir }}/../group_vars/all/vault.yml.new"
      changed_when: true
      no_log: true

    - name: Replace vault file
      ansible.builtin.command:
        cmd: mv "{{ playbook_dir }}/../group_vars/all/vault.yml.new" "{{ playbook_dir }}/../group_vars/all/vault.yml"
      changed_when: true

    - name: Save credentials to local file
      ansible.builtin.copy:
        content: |
          # Wazuh Credentials - Rotated {{ rotation_timestamp }}
          # KEEP THIS FILE SECURE!

          {% if rotate_indexer | bool %}
          Indexer Admin Password: {{ new_indexer_password }}
          {% endif %}
          {% if rotate_api | bool %}
          API Password: {{ new_api_password }}
          {% endif %}
          {% if rotate_authd | bool %}
          Agent Enrollment Password: {{ new_authd_password }}
          {% endif %}
        dest: "{{ playbook_dir }}/../credentials/rotated-{{ rotation_timestamp }}.txt"
        mode: '0600'
      no_log: true

- name: Rotation Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display rotation summary
      ansible.builtin.debug:
        msg: |

          ═══════════════════════════════════════════════════════════
          CREDENTIAL ROTATION COMPLETE
          ═══════════════════════════════════════════════════════════

          Rotation ID: {{ rotation_timestamp }}

          Updated Credentials:
          {% if rotate_api | bool %}
            ✓ Wazuh API password
          {% endif %}
          {% if rotate_indexer | bool %}
            ✓ Indexer admin password
            ✓ Dashboard configuration
            ✓ Filebeat configuration
          {% endif %}
          {% if rotate_authd | bool %}
            ✓ Agent enrollment password
          {% endif %}

          Files Updated:
            - group_vars/all/vault.yml (encrypted)
            - credentials/rotated-{{ rotation_timestamp }}.txt

          Backup Location:
            - credentials/backup-{{ rotation_timestamp }}/

          ⚠ IMPORTANT:
            - View new credentials: ./scripts/manage-vault.sh view
            - Update any external integrations manually
            - Test all connections before production use

          ═══════════════════════════════════════════════════════════
